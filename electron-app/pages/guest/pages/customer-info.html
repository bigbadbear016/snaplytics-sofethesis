<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Héigen Studio - Booking Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../../../styles/main.css">
    <script src="../../../scripts/alert-modal.js"></script>
    <link rel="stylesheet" href="../css/customer-info.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
            <div class="sidebar-logo-full">
                <img src="https://api.builder.io/api/v1/image/assets/TEMP/95d7e6647fe0f0196e3e1fcbde41e437ac52b682?width=475" alt="Héigen Studio" />
            </div>
            <div class="sidebar-logo-collapsed">
                <img src="https://cdn.builder.io/api/v1/image/assets%2F44110a21a8084c3ca12bd1cab5fb0319%2F8f239903328d456d91fb45d686753de2?format=webp&width=800&height=1200" alt="Héigen Studio Logo" />
            </div>
        </div>

        <nav class="sidebar-menu">
            <div class="menu-items">
                <!-- Booking Form -->
                <a href="customer-info.html" class="menu-item active" data-page="booking-form">
                    <svg viewBox="0 0 24 24">
                        <path d="M18 5V4C18 3.44772 17.5523 3 17 3H8.91421C8.649 3 8.39464 3.10536 8.20711 3.29289L4.29289 7.20711C4.10536 7.39464 4 7.649 4 7.91421V20C4 20.5523 4.44772 21 5 21H17C17.5523 21 18 20.5523 18 20V15M9 3V7C9 7.55228 8.55228 8 8 8H4M15.383 8.77198L18.128 11.518M19.343 7.61198C19.537 7.8058 19.6909 8.03597 19.796 8.28932C19.901 8.54267 19.955 8.81423 19.955 9.08848C19.955 9.36273 19.901 9.63429 19.796 9.88764C19.6909 10.141 19.537 10.3712 19.343 10.565L12.693 17.211L9 17.95L9.739 14.258L16.385 7.61198C16.5789 7.4172 16.8094 7.26265 17.0632 7.15719C17.317 7.05173 17.5892 6.99744 17.864 6.99744C18.1388 6.99744 18.411 7.05173 18.6648 7.15719C18.9186 7.26265 19.1491 7.4172 19.343 7.61198Z" />
                    </svg>
                    <span class="menu-label">Booking Form</span>
                </a>

                <div class="menu-divider"></div>

                <!-- Profile -->
                <a href="profile.html" class="menu-item inactive" data-page="profile">
                    <svg viewBox="0 0 24 24">
                        <path d="M12 21C16.9706 21 21 16.9706 21 12C21 7.02944 16.9706 3 12 3C7.02944 3 3 7.02944 3 12C3 16.9706 7.02944 21 12 21ZM12 21C13.7608 21.0019 15.483 20.4843 16.951 19.512C16.835 18.5451 16.3691 17.6541 15.6412 17.0071C14.9133 16.3601 13.9739 16.0019 13 16H11C10.0261 16.0019 9.08665 16.3601 8.35879 17.0071C7.63092 17.6541 7.16502 18.5451 7.049 19.512C8.51698 20.4843 10.2392 21.0019 12 21ZM15 10C15 11.6569 13.6569 13 12 13C10.3431 13 9 11.6569 9 10C9 8.34315 10.3431 7 12 7C13.6569 7 15 8.34315 15 10Z" />
                    </svg>
                    <span class="menu-label">Profile</span>
                </a>

                <!-- Logout -->
                <a href="#" onclick="openLogoutModal(event)" class="menu-item inactive" data-page="logout">
                    <svg viewBox="0 0 24 24">
                        <path d="M9.35294 16.1996V18.2996C9.35294 18.8566 9.57605 19.3907 9.97319 19.7845C10.3703 20.1784 10.909 20.3996 11.4706 20.3996L18.8824 20.3996C19.444 20.3996 19.9826 20.1784 20.3798 19.7845C20.7769 19.3907 21 18.8566 21 18.2996L21 5.69961C21 5.14266 20.7769 4.60851 20.3798 4.21469C19.9826 3.82086 19.444 3.59961 18.8824 3.59961L11.4706 3.59961C10.909 3.59961 10.3703 3.82086 9.97319 4.21469C9.57605 4.60851 9.35294 5.14265 9.35294 5.69961V7.79961M15.7059 11.9996L3 11.9996M3 11.9996L6.17647 15.1496M3 11.9996L6.17647 8.84961" />
                    </svg>
                    <span class="menu-label">Logout</span>
                </a>
            </div>
        </nav>

        <button class="sidebar-toggle" id="sidebarToggle">
            <svg viewBox="0 0 28 28">
                <path d="M12.367 20.0667L5.83366 13.5333L12.367 7M22.167 20.0667L15.6337 13.5333L22.167 7" />
            </svg>
        </button>
    </aside>

    <!-- Main Content -->
    <main class="main-container" id="mainContainer">
        <!-- Header -->
        <div class="header px-4 lg:px-6">
            <div class="flex items-center gap-4">
                <button onclick="toggleMobileSidebar(true)" class="lg:hidden text-[#4F6E79] hover:bg-gray-100 p-2 rounded">
                    <div class="menu-icon">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                </button>
                <h1 class="text-[#4F6E79] font-bold text-[20px] lg:text-[28px]">Booking Form - Customer Info</h1>
            </div>
            
            <div class="flex items-center gap-2 lg:gap-4">
                <div class="hidden sm:flex flex-col items-end gap-1">
                    <div class="text-[#4F6E79] font-bold text-[14px] lg:text-[18px]">CUSTOMER</div>
                    <div class="text-[#4F6E79] font-bold text-[12px] lg:text-[14px]">Guest Account</div>
                </div>
                <img src="../image/guest.png" alt="User Avatar" class="w-[48px] h-[48px] lg:w-[61px] lg:h-[61px] rounded-full object-cover">
            </div>
        </div>

                <div class="page-container">
            <!-- Booking Form Page -->
            <div id="booking-form-page" class="page-content">
                <div class="card">
                    <h2 class="card-title">Customer Info</h2>
                    <form class="form-container" id="bookingForm">
                        <!-- First Visit -->
                        <div class="form-group">
                            <label class="form-label">Is this your first visit?</label>
                            <div class="select-wrapper">
                                <select name="firstVisit" class="form-select" required>
                                    <option value="">Yes / No</option>
                                    <option value="yes">Yes</option>
                                    <option value="no">No</option>
                                </select>
                            </div>
                        </div>

                        <!-- Name -->
                        <div class="form-group">
                            <label class="form-label">Name</label>
                            <input type="text" name="name" class="form-input" placeholder="Enter full name" required />
                        </div>

                        <!-- Email -->
                        <div class="form-group">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-input" placeholder="Enter email" required />
                        </div>

                        <!-- Contact Number -->
                        <div class="form-group">
                            <label class="form-label">Contact No.</label>
                            <input type="tel" name="contactNo" class="form-input" placeholder="Enter contact no." required />
                        </div>

                        <!-- Consent Checkbox -->
                        <div class="checkbox-group">
                            <input type="checkbox" name="consent" id="consent" class="checkbox-input" />
                            <label for="consent" class="checkbox-label">
                                I hereby consent to Heigen Studio releasing my photos on public and social media platforms.
                            </label>
                        </div>

                        <!-- Submit Button -->
                        <div class="button-container">
                            <button type="submit" class="btn">Next</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </main>
</div>
        <div id="logoutModal"
            class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50">

        <div class="bg-white rounded-2xl shadow-xl w-[90%] max-w-md p-6">
            
            <h2 class="text-xl font-bold text-[#165166] mb-4">
            Confirm Logout
            </h2>

            <p class="text-gray-600 mb-6">
            Are you sure you want to log out?
            </p>

            <div class="flex justify-end gap-3">
            <button onclick="closeLogoutModal()"
                    class="px-4 py-2 rounded-lg bg-gray-200 text-gray-700 font-semibold hover:bg-gray-300">
                Cancel
            </button>

            <button onclick="confirmLogout()"
                    class="px-4 py-2 rounded-lg bg-[#165166] text-white font-semibold hover:bg-[#0d3d4d]">
                Logout
            </button>
            </div>
        </div>
    </div>
  <script>
            function openLogoutModal(e) {
            e.preventDefault();
            document.getElementById('logoutModal').classList.remove('hidden');
            document.getElementById('logoutModal').classList.add('flex');
        }

        function closeLogoutModal() {
            document.getElementById('logoutModal').classList.add('hidden');
            document.getElementById('logoutModal').classList.remove('flex');
        }

        function confirmLogout() {
            const loadingOverlay = document.getElementById("guestLoadingOverlay");
            const logoutModal = document.getElementById("logoutModal");
            console.debug("[GUEST_DEBUG] logout.start", {
                page: window.location.pathname,
                href: window.location.href,
                hasGuestCustomer: !!sessionStorage.getItem("guestCustomer"),
                lastBooking: sessionStorage.getItem("guestDebugLastBooking"),
                bodyInlinePointerEvents: document.body.style.pointerEvents || "(unset)",
                bodyComputedPointerEvents: window.getComputedStyle(document.body).pointerEvents,
                overlay: loadingOverlay
                    ? {
                          display: loadingOverlay.style.display || "(unset)",
                          computedDisplay: window.getComputedStyle(loadingOverlay).display,
                          pointerEvents: window.getComputedStyle(loadingOverlay).pointerEvents,
                      }
                    : null,
                logoutModal: logoutModal
                    ? {
                          className: logoutModal.className,
                          computedDisplay: window.getComputedStyle(logoutModal).display,
                      }
                    : null,
                activeElement: document.activeElement
                    ? {
                          tagName: document.activeElement.tagName,
                          id: document.activeElement.id || null,
                      }
                    : null,
            });
            try {
                closeLogoutModal();
                if (loadingOverlay) {
                    loadingOverlay.style.display = "none";
                    loadingOverlay.remove();
                }
                document.body.style.pointerEvents = "auto";
                sessionStorage.removeItem("guestCustomer");
                console.debug("[GUEST_DEBUG] logout.cleanup.done", {
                    page: window.location.pathname,
                    hasGuestCustomer: !!sessionStorage.getItem("guestCustomer"),
                    bodyPointerEvents: document.body.style.pointerEvents || "(unset)",
                });
            } catch (err) {
                console.warn("Guest logout cleanup failed:", err);
            }
            console.debug("[GUEST_DEBUG] logout.redirect", {
                to: "../../../index.html?from_logout=1",
            });
            window.location.replace("../../../index.html?from_logout=1");
        }



        // Sidebar Toggle
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebarToggle');
        const mainContainer = document.getElementById('mainContainer');

        sidebarToggle.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            mainContainer.classList.toggle('sidebar-collapsed');
        });

        // Page Navigation
        const menuItems = document.querySelectorAll('.menu-item');

        const pages = {
            'booking-form': 'customer-info.html',
            'profile': 'profile.html',
        };

        menuItems.forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();

                const page = item.dataset.page;

                if (!page || !pages[page]) return;

                // Navigate to the page
                window.location.href = pages[page];
            });
        });

        // Form Submission
        const bookingForm = document.getElementById('bookingForm');
        if (bookingForm) {
            bookingForm.addEventListener('submit', (e) => {
                e.preventDefault();

                const formData = new FormData(bookingForm);
                const data = {
                    firstVisit: formData.get('firstVisit'),
                    name: formData.get('name'),
                    email: formData.get('email'),
                    contactNo: formData.get('contactNo'),
                    consent: formData.get('consent') === 'on'
                };

                console.log('Form submitted:', data);

                // Navigate to bookingform_packagelist.html
                window.location.href = 'bookingform_packagelist.html';
            });
        }
  </script>
    <script src="../js/customer-info.js"></script>
    
</body>
</html>
