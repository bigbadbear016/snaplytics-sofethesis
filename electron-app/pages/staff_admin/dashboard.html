        <script>
            let riskChart, dosingChart, popularityChart;

            function _escHtml(s) {
                return String(s ?? "")
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;");
            }

            // ── Chart colour palette (brand-aligned) ────────────────────────
            const CHART_COLORS = {
                teal:    "#165166",
                muted:   "#9BB5BC",
                blue:    "#4F9BB8",
                amber:   "#E8A838",
                green:   "#6BA38A",
                purple:  "#7C3AED",
                lilac:   "#A78BFA",
                lavender:"#C4B5FD",
                pale:    "#E8E0F5",
            };

            // ── Shared chart defaults ────────────────────────────────────────
            Chart.defaults.font.family = "'Segoe UI', sans-serif";

            // ── Update or create a chart ─────────────────────────────────────
            function _upsertChart(ref, ctx, config) {
                if (!ctx) return ref;
                if (ref) { ref.destroy(); }
                return new Chart(ctx, config);
            }

            // ─────────────────────────────────────────────────────────────────
            // RISK OVERVIEW  —  doughnut
            // Data: risk_overview from /api/analytics/dashboard/
            // Two segments: Unlikely (very_unlikely + unlikely), Likely (likely + very_likely)
            // ─────────────────────────────────────────────────────────────────
            function renderRiskChart(data) {
                const ctx = document.getElementById("riskChart");
                const vu = data.very_unlikely || 0;
                const u = data.unlikely || 0;
                const l = data.likely || 0;
                const vl = data.very_likely || 0;
                const unlikelyTotal = vu + u;
                const likelyTotal = l + vl;
                const vals = [unlikelyTotal, likelyTotal];
                const total = vals.reduce((a,b) => a+b, 0) || 1;

                const elUnlikely = document.getElementById("risk_unlikely");
                if (elUnlikely) elUnlikely.textContent = unlikelyTotal;
                const elLikely = document.getElementById("risk_likely");
                if (elLikely) elLikely.textContent = likelyTotal;
                const rateEl = document.getElementById("risk_rate_label");
                if (rateEl) rateEl.textContent = "Renewal Rate";
                const rateValEl = document.getElementById("risk_rate_value");
                if (rateValEl) rateValEl.textContent = data.booking_rate != null
                    ? (data.booking_rate * 100).toFixed(1) + "%" : "-";

                riskChart = _upsertChart(riskChart, ctx, {
                    type: "doughnut",
                    data: {
                        labels: ["Unlikely", "Likely"],
                        datasets: [{
                            data: vals,
                            backgroundColor: [
                                CHART_COLORS.lilac,
                                CHART_COLORS.pale,
                            ],
                            borderColor: "#FFFFFF",
                            borderWidth: 3,
                        }],
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        cutout: "68%",
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    label: (ctx) => {
                                        const pct = ((ctx.parsed / total) * 100).toFixed(1);
                                        return ` ${ctx.label}: ${ctx.parsed} (${pct}%)`;
                                    },
                                },
                            },
                        },
                    },
                    plugins: [{
                        id: "centerText",
                        beforeDatasetsDraw(chart) {
                            const { width, height, ctx: c } = chart;
                            c.save();
                            const cx = width / 2, cy = height / 2;
                            const renewedPct = data.booking_rate != null
                                ? (data.booking_rate * 100).toFixed(1) + "%"
                                : likelyTotal;
                            c.font = `bold ${(height / 180).toFixed(2)}em Segoe UI`;
                            c.fillStyle = CHART_COLORS.teal;
                            c.textAlign = "center";
                            c.textBaseline = "middle";
                            c.fillText(renewedPct, cx, cy - 10);
                            c.font = `${(height / 300).toFixed(2)}em Segoe UI`;
                            c.fillStyle = "#999";
                            c.fillText("Renewal Rate", cx, cy + 14);
                            c.restore();
                        },
                    }],
                });
            }

            // ─────────────────────────────────────────────────────────────────
            // BOOKING TRENDS  —  line chart
            // Data: booking_trends from /api/analytics/dashboard/
            // Shows monthly booking volume + revenue over last 12 months
            // ─────────────────────────────────────────────────────────────────
            function renderTrendsChart(data) {
                const ctx = document.getElementById("dosingChart");
                dosingChart = _upsertChart(dosingChart, ctx, {
                    type: "line",
                    data: {
                        labels: data.labels || [],
                        datasets: [
                            {
                                label: "Bookings",
                                data: data.bookings || [],
                                borderColor: CHART_COLORS.muted,
                                backgroundColor: "rgba(155,181,188,0.12)",
                                tension: 0.4,
                                fill: true,
                                pointRadius: 4,
                                pointBackgroundColor: CHART_COLORS.muted,
                                pointBorderColor: "#fff",
                                pointBorderWidth: 2,
                                yAxisID: "yCount",
                            },
                            {
                                label: "Revenue (₱)",
                                data: data.revenue || [],
                                borderColor: CHART_COLORS.amber,
                                backgroundColor: "rgba(232,168,56,0.08)",
                                tension: 0.4,
                                fill: false,
                                pointRadius: 3,
                                pointBackgroundColor: CHART_COLORS.amber,
                                pointBorderColor: "#fff",
                                pointBorderWidth: 2,
                                yAxisID: "yRevenue",
                            },
                        ],
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: "index", intersect: false },
                        plugins: {
                            legend: {
                                display: true,
                                position: "top",
                                align: "end",
                                labels: { boxWidth: 10, padding: 12, font: { size: 11 } },
                            },
                            tooltip: {
                                callbacks: {
                                    label: (ctx) => {
                                        if (ctx.dataset.yAxisID === "yRevenue")
                                            return ` Revenue: ₱${Number(ctx.parsed.y).toLocaleString("en-PH", {minimumFractionDigits:2})}`;
                                        return ` Bookings: ${ctx.parsed.y}`;
                                    },
                                },
                            },
                        },
                        scales: {
                            yCount: {
                                type: "linear",
                                position: "left",
                                beginAtZero: true,
                                ticks: { stepSize: 1, font: { size: 10 } },
                                grid: { color: "rgba(0,0,0,0.05)" },
                                title: { display: true, text: "Bookings", font: { size: 10 }, color: CHART_COLORS.muted },
                            },
                            yRevenue: {
                                type: "linear",
                                position: "right",
                                beginAtZero: true,
                                grid: { drawOnChartArea: false },
                                ticks: {
                                    font: { size: 10 },
                                    callback: (v) => "₱" + (v >= 1000 ? (v/1000).toFixed(1)+"k" : v),
                                },
                                title: { display: true, text: "Revenue", font: { size: 10 }, color: CHART_COLORS.amber },
                            },
                            x: {
                                grid: { display: false },
                                ticks: { font: { size: 10 }, maxRotation: 45 },
                            },
                        },
                    },
                });
            }

            // ─────────────────────────────────────────────────────────────────
            // PACKAGE POPULARITY  —  grouped bar chart
            // Data: package_popularity from /api/analytics/dashboard/
            // Shows per-package booking counts for last 6 months
            // ─────────────────────────────────────────────────────────────────
            function renderPopularityChart(data) {
                const ctx = document.getElementById("popularityChart");
                const maxVal = Math.max(
                    1,
                    ...( data.datasets || []).flatMap(ds => ds.data || [])
                );
                popularityChart = _upsertChart(popularityChart, ctx, {
                    type: "bar",
                    data: {
                        labels: data.labels || [],
                        datasets: (data.datasets || []).map((ds, i) => ({
                            ...ds,
                            borderRadius: 4,
                            borderSkipped: false,
                        })),
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: "index", intersect: false },
                        plugins: {
                            legend: {
                                display: true,
                                position: "bottom",
                                labels: { boxWidth: 10, padding: 12, font: { size: 11 } },
                            },
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                max: Math.ceil(maxVal * 1.15) || 5,
                                ticks: { stepSize: 1, font: { size: 10 } },
                                grid: { color: "rgba(0,0,0,0.05)" },
                                title: { display: true, text: "Bookings", font: { size: 10 } },
                            },
                            x: {
                                grid: { display: false },
                                ticks: { font: { size: 10 } },
                            },
                        },
                    },
                });
            }

            // ─────────────────────────────────────────────────────────────────
            // INIT CHARTS — fetch analytics then render all three
            // ─────────────────────────────────────────────────────────────────
            window.__lastDashboardAnalytics = null;

            function _analyticsQueryParams() {
                const fromEl = document.getElementById("analyticsDateFrom");
                const toEl = document.getElementById("analyticsDateTo");
                const params = {};
                if (fromEl?.value && toEl?.value) {
                    params.date_from = fromEl.value;
                    params.date_to = toEl.value;
                }
                return params;
            }

            window.applyAnalyticsDateFilter = function applyAnalyticsDateFilter() {
                initCharts();
            };

            window.resetAnalyticsDateFilter = function resetAnalyticsDateFilter() {
                const fromEl = document.getElementById("analyticsDateFrom");
                const toEl = document.getElementById("analyticsDateTo");
                if (fromEl) fromEl.value = "";
                if (toEl) toEl.value = "";
                initCharts();
            };

            async function initCharts() {
                try {
                    const analytics = await window.apiClient.analytics.dashboard(
                        _analyticsQueryParams(),
                    );
                    window.__lastDashboardAnalytics = analytics;
                    renderRiskChart(analytics.risk_overview       || {});
                    renderTrendsChart(analytics.booking_trends    || { labels:[], bookings:[], revenue:[] });
                    renderPopularityChart(analytics.package_popularity || { labels:[], datasets:[] });
                } catch (err) {
                    console.warn("[charts] analytics endpoint unavailable, using static fallback:", err.message);
                    window.__lastDashboardAnalytics = null;
                    renderRiskChart({ very_unlikely:0, unlikely:0, likely:0, very_likely:0, booking_rate:0 });
                    renderTrendsChart({ labels:["No data"], bookings:[0], revenue:[0] });
                    renderPopularityChart({ labels:["No data"], datasets:[] });
                }
            }

            window.downloadDashboardPdf = function downloadDashboardPdf() {
                const d = window.__lastDashboardAnalytics;
                if (!d || !window.jspdf) {
                    window.heigenAlert("Load analytics first, or PDF library failed to load.");
                    return;
                }
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ unit: "pt", format: "a4" });
                const margin = 40;
                let y = margin;
                const filters = d.filters || {};
                doc.setFontSize(16);
                doc.setTextColor(22, 81, 102);
                doc.text("Heigen Studio — Analytics", margin, y);
                y += 28;
                doc.setFontSize(10);
                doc.setTextColor(80, 80, 80);
                doc.text(
                    `Date range: ${filters.date_from || "—"} → ${filters.date_to || "—"}`,
                    margin,
                    y,
                );
                y += 22;

                doc.setFontSize(13);
                doc.setTextColor(0, 68, 92);
                doc.text("Booking trends", margin, y);
                y += 8;
                const bt = d.booking_trends || {};
                const labels = bt.labels || [];
                const rows = labels.map((lab, i) => [
                    lab,
                    String((bt.bookings || [])[i] ?? ""),
                    `₱${Number((bt.revenue || [])[i] || 0).toLocaleString("en-PH", { minimumFractionDigits: 2 })}`,
                ]);
                doc.autoTable({
                    startY: y,
                    head: [["Period", "Bookings", "Revenue"]],
                    body: rows.length ? rows : [["—", "0", "₱0.00"]],
                    styles: { fontSize: 9 },
                    headStyles: { fillColor: [22, 81, 102] },
                    margin: { left: margin, right: margin },
                });
                y = doc.lastAutoTable.finalY + 24;

                doc.setFontSize(13);
                doc.setTextColor(0, 68, 92);
                doc.text("Package popularity", margin, y);
                y += 8;
                const pp = d.package_popularity || {};
                const plabels = pp.labels || [];
                const ds = pp.datasets || [];
                const popHead = ["Package", ...plabels];
                const popBody = ds.map((row) => [
                    row.label || "",
                    ...(row.data || []).map((v) => String(v)),
                ]);
                doc.autoTable({
                    startY: y,
                    head: [popHead],
                    body: popBody.length ? popBody : [["—", ...plabels.map(() => "0")]],
                    styles: { fontSize: 8 },
                    headStyles: { fillColor: [22, 81, 102] },
                    margin: { left: margin, right: margin },
                    tableWidth: "wrap",
                });

                doc.save(`heigen-analytics-${(filters.date_from || "all")}-${(filters.date_to || "all")}.pdf`);
            };

            function toggleMobileSidebar(show) {
                const sidebar = document.getElementById("sidebar");
                const overlay = document.getElementById("mobileOverlay");
                if (!sidebar || !overlay) return;

                if (show) {
                    sidebar.classList.add("mobile-open");
                    overlay.classList.add("show");
                } else {
                    sidebar.classList.remove("mobile-open");
                    overlay.classList.remove("show");
                }
            }

            function navigateTo(section) {
                // Hide all sections
                document.querySelectorAll(".section").forEach((s) => {
                    s.classList.remove("active");
                });

                // Remove active from all nav items
                document.querySelectorAll(".sidebar-nav-item").forEach((item) => {
                    item.classList.remove("is-active");
                });

                // Show selected section
                const selectedSection = document.getElementById(section);
                if (selectedSection) {
                    selectedSection.classList.add("active");
                }

                // Set active nav item
                const navItems = document.querySelectorAll(".sidebar-nav-item");
                navItems.forEach((item, index) => {
                    if (section === "dashboard" && index === 0) {
                        item.classList.add("is-active");
                    } else if (section === "customer-data" && index === 1) {
                        item.classList.add("is-active");
                    } else if (section === "package-list" && index === 2) {
                        item.classList.add("is-active");
                    } else if (section === "coupons" && index === 3) {
                        item.classList.add("is-active");
                    } else if (section === "edit-profile" && index === 5) {
                        item.classList.add("is-active");
                    } else if (section === "logout" && index === 6) {
                        item.classList.add("is-active");
                    }
                });

                // Close mobile sidebar
                toggleMobileSidebar(false);

                // Initialize charts when dashboard is shown
                if (section === "dashboard") {
                    setTimeout(initCharts, 100);
                }
            }

            // Initialize charts on page load (package recommendation section removed)
            window.addEventListener("load", () => {
                initCharts();
            });

            // Handle window resize to reinitialize charts
            let resizeTimeout;
            window.addEventListener("resize", () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    if (riskChart) riskChart.resize();
                    if (dosingChart) dosingChart.resize();
                    if (popularityChart) popularityChart.resize();
                }, 250);
            });

            /** Stub — referenced by heigen-app.js; recommendation cards removed from dashboard */
            window.loadDashboardData = async function loadDashboardData() {};

            window.refreshDashboardRecs = async function refreshDashboardRecs() {
                try {
                    await window.apiClient.recommendations.rebuild();
                    console.log("[dashboard] popularity rebuilt");
                } catch (e) {
                    console.warn("[dashboard] rebuild failed (non-fatal):", e.message);
                }
                await initCharts();
            };

        </script>
            <!-- ── NOTIFICATION PANEL (shared across all pages) ── -->
        <div class="booking-status-panel-overlay" id="bookingStatusOverlay" onclick="closeBookingStatusPanel()"></div>
        <div class="booking-status-panel" id="bookingStatusPanel" style="display:none;">
            <div class="booking-status-header">
                <h2>BOOKING STATUS</h2>
                <button class="close-panel-btn" onclick="closeBookingStatusPanel()">×</button>
            </div>
            <div class="booking-status-content" id="bookingStatusContent"></div>
        </div>
        <!-- ── FLOATING NOTIFICATION BUTTON ── -->
        <button class="floating-notification-btn" id="floatingNotificationBtn"
                aria-label="Notifications" onclick="toggleBookingStatusPanel()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M4.50763 17.625H19.4933C19.9097 17.625 20.1458 16.961 19.9006 16.5805C19.3329 15.6996 18.7814 14.401 18.7814 12.835L18.8058 10.6931C18.8058 6.44431 15.7588 3 12 3C8.29581 3 5.29296 6.39431 5.29296 10.5814L5.26855 12.835C5.26855 14.3903 4.69736 15.6818 4.10557 16.5624C3.85054 16.9419 4.08602 17.625 4.50763 17.625Z" fill="white"/>
                <path d="M9.33333 21C9.33333 22.1 10.1 23 12 23C13.9 23 14.6667 22.1 14.6667 21H9.33333Z" fill="white"/>
            </svg>
            <span class="notification-badge" id="notificationBadge" style="display:none;">0</span>
        </button>
        <!-- ── GLOBAL REFRESH BUTTON ── -->
        <button class="global-refresh-btn" id="globalRefreshBtn"
                aria-label="Refresh" onclick="refreshPage()" title="Refresh">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"/>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
        </button>
        <!-- ── PAGE LOADING OVERLAY ── -->
        <div class="page-loading-overlay" id="pageLoadingOverlay" style="display:none;">
            <div class="spinner"></div>
            <div class="loading-label">Loading…</div>
        </div>
        <script src="../../scripts/api-client.js"></script>
        <script src="../../scripts/notif.js"></script>
        <script src="../../scripts/staff-embed.js"></script>

    </body>
</html>
