        <script>
            let riskChart, dosingChart, popularityChart;

            function _escHtml(s) {
                return String(s ?? "")
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;");
            }

            // ── Chart colour palette (brand-aligned) ────────────────────────
            const CHART_COLORS = {
                teal:    "#165166",
                muted:   "#9BB5BC",
                blue:    "#4F9BB8",
                amber:   "#E8A838",
                green:   "#6BA38A",
                purple:  "#7C3AED",
                lilac:   "#A78BFA",
                lavender:"#C4B5FD",
                pale:    "#E8E0F5",
            };

            // ── Shared chart defaults ────────────────────────────────────────
            Chart.defaults.font.family = "'Segoe UI', sans-serif";

            // ── Update or create a chart ─────────────────────────────────────
            function _upsertChart(ref, ctx, config) {
                if (!ctx) return ref;
                if (ref) { ref.destroy(); }
                return new Chart(ctx, config);
            }

            // ─────────────────────────────────────────────────────────────────
            // RISK OVERVIEW  —  doughnut
            // Data: risk_overview from /api/analytics/dashboard/
            // Segments: Very Unlikely / Unlikely / Likely / Very Likely to return
            // ─────────────────────────────────────────────────────────────────
            function renderRiskChart(data) {
                const ctx = document.getElementById("riskChart");
                const vals = [
                    data.very_unlikely || 0,
                    data.unlikely      || 0,
                    data.likely        || 0,
                    data.very_likely   || 0,
                ];
                const total = vals.reduce((a,b) => a+b, 0) || 1;
                const rate  = data.booking_rate != null
                    ? (data.booking_rate * 100).toFixed(1) + "%"
                    : (vals[2] + vals[3]) + " customers";

                // Update legend numbers
                ["very_unlikely","unlikely","likely","very_likely"].forEach((k,i) => {
                    const el = document.getElementById("risk_" + k);
                    if (el) el.textContent = vals[i];
                });
                const rateEl = document.getElementById("risk_rate_label");
                if (rateEl) rateEl.textContent = "Renewal Rate";
                const rateValEl = document.getElementById("risk_rate_value");
                if (rateValEl) rateValEl.textContent = data.booking_rate != null
                    ? (data.booking_rate * 100).toFixed(1) + "%" : "-";

                riskChart = _upsertChart(riskChart, ctx, {
                    type: "doughnut",
                    data: {
                        labels: ["Very Unlikely","Unlikely","Likely","Very Likely"],
                        datasets: [{
                            data: vals,
                            backgroundColor: [
                                CHART_COLORS.purple,
                                CHART_COLORS.lilac,
                                CHART_COLORS.lavender,
                                CHART_COLORS.pale,
                            ],
                            borderColor: "#FFFFFF",
                            borderWidth: 3,
                        }],
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        cutout: "68%",
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                callbacks: {
                                    label: (ctx) => {
                                        const pct = ((ctx.parsed / total) * 100).toFixed(1);
                                        return ` ${ctx.label}: ${ctx.parsed} (${pct}%)`;
                                    },
                                },
                            },
                        },
                    },
                    plugins: [{
                        id: "centerText",
                        beforeDatasetsDraw(chart) {
                            const { width, height, ctx: c } = chart;
                            c.save();
                            const cx = width / 2, cy = height / 2;
                            const renewedPct = data.booking_rate != null
                                ? (data.booking_rate * 100).toFixed(1) + "%"
                                : (vals[2] + vals[3]);
                            c.font = `bold ${(height / 180).toFixed(2)}em Segoe UI`;
                            c.fillStyle = CHART_COLORS.teal;
                            c.textAlign = "center";
                            c.textBaseline = "middle";
                            c.fillText(renewedPct, cx, cy - 10);
                            c.font = `${(height / 300).toFixed(2)}em Segoe UI`;
                            c.fillStyle = "#999";
                            c.fillText("Renewal Rate", cx, cy + 14);
                            c.restore();
                        },
                    }],
                });
            }

            // ─────────────────────────────────────────────────────────────────
            // BOOKING TRENDS  —  line chart
            // Data: booking_trends from /api/analytics/dashboard/
            // Shows monthly booking volume + revenue over last 12 months
            // ─────────────────────────────────────────────────────────────────
            function renderTrendsChart(data) {
                const ctx = document.getElementById("dosingChart");
                dosingChart = _upsertChart(dosingChart, ctx, {
                    type: "line",
                    data: {
                        labels: data.labels || [],
                        datasets: [
                            {
                                label: "Bookings",
                                data: data.bookings || [],
                                borderColor: CHART_COLORS.muted,
                                backgroundColor: "rgba(155,181,188,0.12)",
                                tension: 0.4,
                                fill: true,
                                pointRadius: 4,
                                pointBackgroundColor: CHART_COLORS.muted,
                                pointBorderColor: "#fff",
                                pointBorderWidth: 2,
                                yAxisID: "yCount",
                            },
                            {
                                label: "Revenue (₱)",
                                data: data.revenue || [],
                                borderColor: CHART_COLORS.amber,
                                backgroundColor: "rgba(232,168,56,0.08)",
                                tension: 0.4,
                                fill: false,
                                pointRadius: 3,
                                pointBackgroundColor: CHART_COLORS.amber,
                                pointBorderColor: "#fff",
                                pointBorderWidth: 2,
                                yAxisID: "yRevenue",
                            },
                        ],
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: "index", intersect: false },
                        plugins: {
                            legend: {
                                display: true,
                                position: "top",
                                align: "end",
                                labels: { boxWidth: 10, padding: 12, font: { size: 11 } },
                            },
                            tooltip: {
                                callbacks: {
                                    label: (ctx) => {
                                        if (ctx.dataset.yAxisID === "yRevenue")
                                            return ` Revenue: ₱${Number(ctx.parsed.y).toLocaleString("en-PH", {minimumFractionDigits:2})}`;
                                        return ` Bookings: ${ctx.parsed.y}`;
                                    },
                                },
                            },
                        },
                        scales: {
                            yCount: {
                                type: "linear",
                                position: "left",
                                beginAtZero: true,
                                ticks: { stepSize: 1, font: { size: 10 } },
                                grid: { color: "rgba(0,0,0,0.05)" },
                                title: { display: true, text: "Bookings", font: { size: 10 }, color: CHART_COLORS.muted },
                            },
                            yRevenue: {
                                type: "linear",
                                position: "right",
                                beginAtZero: true,
                                grid: { drawOnChartArea: false },
                                ticks: {
                                    font: { size: 10 },
                                    callback: (v) => "₱" + (v >= 1000 ? (v/1000).toFixed(1)+"k" : v),
                                },
                                title: { display: true, text: "Revenue", font: { size: 10 }, color: CHART_COLORS.amber },
                            },
                            x: {
                                grid: { display: false },
                                ticks: { font: { size: 10 }, maxRotation: 45 },
                            },
                        },
                    },
                });
            }

            // ─────────────────────────────────────────────────────────────────
            // PACKAGE POPULARITY  —  grouped bar chart
            // Data: package_popularity from /api/analytics/dashboard/
            // Shows per-package booking counts for last 6 months
            // ─────────────────────────────────────────────────────────────────
            function renderPopularityChart(data) {
                const ctx = document.getElementById("popularityChart");
                const maxVal = Math.max(
                    1,
                    ...( data.datasets || []).flatMap(ds => ds.data || [])
                );
                popularityChart = _upsertChart(popularityChart, ctx, {
                    type: "bar",
                    data: {
                        labels: data.labels || [],
                        datasets: (data.datasets || []).map((ds, i) => ({
                            ...ds,
                            borderRadius: 4,
                            borderSkipped: false,
                        })),
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        interaction: { mode: "index", intersect: false },
                        plugins: {
                            legend: {
                                display: true,
                                position: "bottom",
                                labels: { boxWidth: 10, padding: 12, font: { size: 11 } },
                            },
                        },
                        scales: {
                            y: {
                                beginAtZero: true,
                                max: Math.ceil(maxVal * 1.15) || 5,
                                ticks: { stepSize: 1, font: { size: 10 } },
                                grid: { color: "rgba(0,0,0,0.05)" },
                                title: { display: true, text: "Bookings", font: { size: 10 } },
                            },
                            x: {
                                grid: { display: false },
                                ticks: { font: { size: 10 } },
                            },
                        },
                    },
                });
            }

            // ─────────────────────────────────────────────────────────────────
            // INIT CHARTS — fetch analytics then render all three
            // ─────────────────────────────────────────────────────────────────
            window.__lastDashboardAnalytics = null;
            window.__dashRecsCache = [];

            function _analyticsQueryParams() {
                const fromEl = document.getElementById("analyticsDateFrom");
                const toEl = document.getElementById("analyticsDateTo");
                const params = {};
                if (fromEl?.value && toEl?.value) {
                    params.date_from = fromEl.value;
                    params.date_to = toEl.value;
                }
                return params;
            }

            window.applyAnalyticsDateFilter = function applyAnalyticsDateFilter() {
                initCharts();
            };

            window.resetAnalyticsDateFilter = function resetAnalyticsDateFilter() {
                const fromEl = document.getElementById("analyticsDateFrom");
                const toEl = document.getElementById("analyticsDateTo");
                if (fromEl) fromEl.value = "";
                if (toEl) toEl.value = "";
                initCharts();
            };

            async function initCharts() {
                try {
                    const analytics = await window.apiClient.analytics.dashboard(
                        _analyticsQueryParams(),
                    );
                    window.__lastDashboardAnalytics = analytics;
                    renderRiskChart(analytics.risk_overview       || {});
                    renderTrendsChart(analytics.booking_trends    || { labels:[], bookings:[], revenue:[] });
                    renderPopularityChart(analytics.package_popularity || { labels:[], datasets:[] });
                } catch (err) {
                    console.warn("[charts] analytics endpoint unavailable, using static fallback:", err.message);
                    window.__lastDashboardAnalytics = null;
                    renderRiskChart({ very_unlikely:0, unlikely:0, likely:0, very_likely:0, booking_rate:0 });
                    renderTrendsChart({ labels:["No data"], bookings:[0], revenue:[0] });
                    renderPopularityChart({ labels:["No data"], datasets:[] });
                }
            }

            window.downloadDashboardPdf = function downloadDashboardPdf() {
                const d = window.__lastDashboardAnalytics;
                if (!d || !window.jspdf) {
                    alert("Load analytics first, or PDF library failed to load.");
                    return;
                }
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF({ unit: "pt", format: "a4" });
                const margin = 40;
                let y = margin;
                const filters = d.filters || {};
                doc.setFontSize(16);
                doc.setTextColor(22, 81, 102);
                doc.text("Heigen Studio — Analytics", margin, y);
                y += 28;
                doc.setFontSize(10);
                doc.setTextColor(80, 80, 80);
                doc.text(
                    `Date range: ${filters.date_from || "—"} → ${filters.date_to || "—"}`,
                    margin,
                    y,
                );
                y += 22;

                doc.setFontSize(13);
                doc.setTextColor(0, 68, 92);
                doc.text("Booking trends", margin, y);
                y += 8;
                const bt = d.booking_trends || {};
                const labels = bt.labels || [];
                const rows = labels.map((lab, i) => [
                    lab,
                    String((bt.bookings || [])[i] ?? ""),
                    `₱${Number((bt.revenue || [])[i] || 0).toLocaleString("en-PH", { minimumFractionDigits: 2 })}`,
                ]);
                doc.autoTable({
                    startY: y,
                    head: [["Period", "Bookings", "Revenue"]],
                    body: rows.length ? rows : [["—", "0", "₱0.00"]],
                    styles: { fontSize: 9 },
                    headStyles: { fillColor: [22, 81, 102] },
                    margin: { left: margin, right: margin },
                });
                y = doc.lastAutoTable.finalY + 24;

                doc.setFontSize(13);
                doc.setTextColor(0, 68, 92);
                doc.text("Package popularity", margin, y);
                y += 8;
                const pp = d.package_popularity || {};
                const plabels = pp.labels || [];
                const ds = pp.datasets || [];
                const popHead = ["Package", ...plabels];
                const popBody = ds.map((row) => [
                    row.label || "",
                    ...(row.data || []).map((v) => String(v)),
                ]);
                doc.autoTable({
                    startY: y,
                    head: [popHead],
                    body: popBody.length ? popBody : [["—", ...plabels.map(() => "0")]],
                    styles: { fontSize: 8 },
                    headStyles: { fillColor: [22, 81, 102] },
                    margin: { left: margin, right: margin },
                    tableWidth: "wrap",
                });

                doc.save(`heigen-analytics-${(filters.date_from || "all")}-${(filters.date_to || "all")}.pdf`);
            };

            function closeAddToPackageModal() {
                const m = document.getElementById("addToPackageModal");
                if (m) m.remove();
            }

            window.openAddToPackageModal = function openAddToPackageModal(index) {
                const rec = (window.__dashRecsCache || [])[index];
                if (!rec || !window.PackageFlowStorage) {
                    alert("Recommendation data not available.");
                    return;
                }
                const pkg = rec.package || {};
                const category = pkg.category || rec.category || "Uncategorized";
                const existing = window.PackageFlowStorage.listCategories();
                closeAddToPackageModal();
                const overlay = document.createElement("div");
                overlay.id = "addToPackageModal";
                overlay.className = "fixed inset-0 z-[60] flex items-center justify-center bg-black/50 p-4";
                overlay.innerHTML = `
                  <div class="bg-white rounded-2xl shadow-xl max-w-md w-full p-6" role="dialog">
                    <h3 class="text-[#165166] font-bold text-lg mb-2">Add to Package</h3>
                    <p class="text-sm text-gray-600 mb-4">Choose category (चयन) or create a new one for your saved list.</p>
                    <label class="text-xs font-bold text-[#5F6E79] block mb-1">Category</label>
                    <select id="addPkgCatSelect" class="w-full border border-[#A3A2A2] rounded-lg px-3 py-2 text-sm mb-2">
                      ${existing.map((c) => `<option value="${_escHtml(c)}">${_escHtml(c)}</option>`).join("")}
                    </select>
                    <input id="addPkgCatNew" type="text" placeholder="New category name"
                      class="w-full border border-[#A3A2A2] rounded-lg px-3 py-2 text-sm mb-4" />
                    <div class="flex justify-end gap-2">
                      <button type="button" onclick="closeAddToPackageModal()" class="rounded-full border border-[#165166] text-[#165166] text-xs font-bold px-5 py-2">Cancel</button>
                      <button type="button" id="addPkgConfirmBtn" class="rounded-full bg-[#165166] text-white text-xs font-bold px-5 py-2">Add</button>
                    </div>
                  </div>`;
                overlay.addEventListener("click", (e) => {
                    if (e.target === overlay) closeAddToPackageModal();
                });
                document.body.appendChild(overlay);
                document.getElementById("addPkgConfirmBtn").onclick = () => {
                    const sel = document.getElementById("addPkgCatSelect");
                    const neu = document.getElementById("addPkgCatNew");
                    let cat = (neu.value || "").trim();
                    if (!cat) cat = (sel.value || "").trim();
                    if (!cat) {
                        alert("Select or enter a category.");
                        return;
                    }
                    window.PackageFlowStorage.add(cat, {
                        packageId: pkg.id,
                        packageName: pkg.name || rec.package_name,
                        category: category,
                        basePrice: rec.base_price ?? rec.price,
                        totalPrice: rec.total_price,
                        source: rec.source || "",
                    });
                    closeAddToPackageModal();
                    alert(`Saved under “${cat}”. View lists from Package List page (local storage).`);
                };
            };

            function toggleMobileSidebar(show) {
                const sidebar = document.getElementById("sidebar");
                const overlay = document.getElementById("mobileOverlay");

                if (show) {
                    sidebar.classList.add("mobile-open");
                    overlay.classList.add("show");
                } else {
                    sidebar.classList.remove("mobile-open");
                    overlay.classList.remove("show");
                }
            }

            function navigateTo(section) {
                // Hide all sections
                document.querySelectorAll(".section").forEach((s) => {
                    s.classList.remove("active");
                });

                // Remove active from all nav items
                document.querySelectorAll(".sidebar-nav-item").forEach((item) => {
                    item.classList.remove("is-active");
                });

                // Show selected section
                const selectedSection = document.getElementById(section);
                if (selectedSection) {
                    selectedSection.classList.add("active");
                }

                // Set active nav item
                const navItems = document.querySelectorAll(".sidebar-nav-item");
                navItems.forEach((item, index) => {
                    if (section === "dashboard" && index === 0) {
                        item.classList.add("is-active");
                    } else if (section === "customer-data" && index === 1) {
                        item.classList.add("is-active");
                    } else if (section === "package-list" && index === 2) {
                        item.classList.add("is-active");
                    } else if (section === "survey-form" && index === 3) {
                        item.classList.add("is-active");
                    } else if (section === "edit-profile" && index === 5) {
                        item.classList.add("is-active");
                    } else if (section === "logout" && index === 6) {
                        item.classList.add("is-active");
                    }
                });

                // Close mobile sidebar
                toggleMobileSidebar(false);

                // Initialize charts when dashboard is shown
                if (section === "dashboard") {
                    setTimeout(initCharts, 100);
                }
            }

            // Close mobile overlay when clicked
            document
                .getElementById("mobileOverlay")
                .addEventListener("click", () => {
                    toggleMobileSidebar(false);
                });

            // Initialize charts and dashboard data on page load
            window.addEventListener("load", () => {
                initCharts();
                loadDashboardData();
            });

            // Handle window resize to reinitialize charts
            let resizeTimeout;
            window.addEventListener("resize", () => {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(() => {
                    if (riskChart) riskChart.resize();
                    if (dosingChart) dosingChart.resize();
                    if (popularityChart) popularityChart.resize();
                }, 250);
            });

            // ── Popular recommendations from backend ────────────────────────────
            // ── Recommendation card renderer ────────────────────────────────────────
            // Consumes the shape from GET /api/recommendations/popular/
            // { recommendations: [{package, addons, base_price, total_price, score, source}] }

            function _esc(s) {
                return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
            }

            function renderPopularRecs(recs) {
                const grid = document.getElementById("popularRecsGrid");
                if (!grid) return;

                if (!recs || recs.length === 0) {
                    grid.innerHTML = `
                        <div class="bg-white rounded-[20px] shadow p-6 flex items-center justify-center col-span-full" style="min-height:160px;">
                            <div style="text-align:center;">
                                <div style="font-size:32px;margin-bottom:8px;">📊</div>
                                <p style="color:#ABB7C2;font-size:13px;font-weight:600;">No booking data yet.</p>
                                <p style="color:#C8D5DA;font-size:11px;margin-top:4px;">Add bookings via the Survey Form and hit Refresh.</p>
                            </div>
                        </div>`;
                    return;
                }

                const SOURCE_META = {
                    "popularity":              { label: "Most Popular",    color: "#9BB5BC" },
                    "popular_fallback":        { label: "Most Popular",    color: "#9BB5BC" },
                    "popular_package_monthly": { label: "Trending",        color: "#E8A838" },
                    "popular_package_overall": { label: "Top Booked",      color: "#6BA38A" },
                    "personalized_by_pkg_pred":{ label: "Personalized",    color: "#165166" },
                    "package_list_fallback":   { label: "Available",       color: "#ABB7C2" },
                };

                window.__dashRecsCache = recs.slice(0, 3);
                grid.innerHTML = window.__dashRecsCache.map((rec, cardIndex) => {
                    // Support both old flat shape and new nested shape
                    const pkg       = rec.package || {};
                    const pkgName   = pkg.name   || rec.package_name || ("Package #" + rec.package_id);
                    const category  = pkg.category || rec.category || "";
                    const basePrice = rec.base_price ?? rec.price ?? 0;
                    const totalPrice= rec.total_price ?? basePrice;
                    const promoPrice= pkg.promo_price;
                    const origPrice = pkg.price;
                    const promoCondition = pkg.promo_price_condition || "";
                    const inclusions = Array.isArray(pkg.inclusions) ? pkg.inclusions : [];
                    const freebies   = Array.isArray(pkg.freebies)   ? pkg.freebies   : [];
                    const portraits  = pkg.included_portraits ?? null;
                    const addons     = Array.isArray(rec.addons)      ? rec.addons     : [];
                    const score      = rec.score ?? 0;
                    const source     = rec.source || "popularity";
                    const meta       = SOURCE_META[source] || SOURCE_META["popularity"];

                    // ── Price display ────────────────────────────────────────────
                    const priceHTML = promoPrice && Number(promoPrice) > 0
                        ? `<div style="display:flex;align-items:baseline;gap:8px;margin-bottom:2px;">
                               <span style="font-size:20px;font-weight:800;color:#165166;">₱${Number(promoPrice).toLocaleString("en-PH",{minimumFractionDigits:2})}</span>
                               <span style="font-size:12px;color:#ABB7C2;text-decoration:line-through;">₱${Number(origPrice).toLocaleString("en-PH",{minimumFractionDigits:2})}</span>
                           </div>
                           ${promoCondition ? `<div style="font-size:10px;color:#E8A838;font-weight:600;margin-bottom:6px;">${_esc(promoCondition)}</div>` : ""}`
                        : `<div style="font-size:20px;font-weight:800;color:#165166;margin-bottom:6px;">
                               ₱${Number(origPrice || basePrice).toLocaleString("en-PH",{minimumFractionDigits:2})}
                           </div>`;

                    // ── Portraits ────────────────────────────────────────────────
                    const portraitsHTML = portraits != null
                        ? `<div style="display:inline-flex;align-items:center;gap:4px;background:rgba(22,81,102,0.08);border-radius:99px;padding:2px 8px;margin-bottom:8px;">
                               <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#165166" stroke-width="2.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-5-5L5 21"/></svg>
                               <span style="font-size:10px;font-weight:700;color:#165166;">${portraits} portrait${portraits !== 1 ? "s" : ""} included</span>
                           </div>` : "";

                    // ── Inclusions ───────────────────────────────────────────────
                    const inclusionsHTML = inclusions.length
                        ? `<ul style="margin:0;padding:0;list-style:none;display:flex;flex-direction:column;gap:2px;margin-bottom:8px;">
                               ${inclusions.slice(0, 4).map(inc =>
                                   `<li style="display:flex;align-items:center;gap:5px;font-size:11px;color:#4F6E79;">
                                       <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#9BB5BC" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
                                       ${_esc(inc)}
                                   </li>`
                               ).join("")}
                               ${inclusions.length > 4 ? `<li style="font-size:10px;color:#ABB7C2;padding-left:14px;">+${inclusions.length - 4} more</li>` : ""}
                           </ul>` : "";

                    // ── Freebies ─────────────────────────────────────────────────
                    const freebiesHTML = freebies.length
                        ? `<div style="margin-bottom:8px;">
                               <div style="font-size:9px;font-weight:700;color:#E8A838;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:3px;">🎁 Freebies</div>
                               ${freebies.slice(0, 2).map(f =>
                                   `<div style="font-size:10px;color:#5F6E79;">${_esc(f)}</div>`
                               ).join("")}
                           </div>` : "";

                    // ── Addons ───────────────────────────────────────────────────
                    const addonsHTML = addons.length
                        ? `<div style="border-top:1px solid rgba(22,81,102,0.12);padding-top:8px;margin-top:4px;">
                               <div style="font-size:9px;font-weight:700;color:#ABB7C2;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:5px;">Frequently added</div>
                               ${addons.slice(0, 4).map(a => {
                                   const addonPrice = a.price ? `<span style="color:#9BB5BC;font-size:10px;">+₱${Number(a.price).toLocaleString("en-PH",{minimumFractionDigits:2})}</span>` : "";
                                   return `<div style="display:flex;justify-content:space-between;align-items:center;padding:2px 0;">
                                       <span style="font-size:11px;color:#4F6E79;display:flex;align-items:center;gap:4px;">
                                           <span style="color:#9BB5BC;">+</span>${_esc(a.name)}
                                       </span>
                                       ${addonPrice}
                                   </div>`;
                               }).join("")}
                               ${addons.length > 0 && rec.total_price && rec.total_price !== basePrice
                                   ? `<div style="display:flex;justify-content:space-between;border-top:1px dashed #E0E0E0;margin-top:5px;padding-top:5px;">
                                          <span style="font-size:10px;font-weight:700;color:#5F6E79;">Est. total with add-ons</span>
                                          <span style="font-size:11px;font-weight:800;color:#165166;">₱${Number(rec.total_price).toLocaleString("en-PH",{minimumFractionDigits:2})}</span>
                                      </div>` : ""}
                           </div>` : "";

                    // ── Score badge ──────────────────────────────────────────────
                    const scoreHTML = score > 0
                        ? `<div style="font-size:9px;color:#ABB7C2;margin-top:2px;">${score} booking${score !== 1 ? "s" : ""}</div>` : "";

                    return `
                    <div class="bg-white rounded-[20px] shadow-[0_3px_3px_1px_rgba(13,10,44,0.06)] overflow-hidden flex flex-col">
                        <!-- Card header -->
                        <div style="padding:12px 16px;background:#fff;border-bottom:1px solid #F0F4F5;display:flex;align-items:center;justify-content:space-between;gap:8px;">
                            <div style="min-width:0;">
                                <h3 style="font-weight:800;font-size:14px;color:#00445C;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0;">${_esc(pkgName)}</h3>
                                ${category ? `<div style="font-size:10px;font-weight:700;color:#9BB5BC;text-transform:uppercase;letter-spacing:0.06em;margin-top:1px;">${_esc(category)}</div>` : ""}
                            </div>
                            <span style="flex-shrink:0;font-size:9px;font-weight:700;color:${meta.color};background:${meta.color}1A;padding:3px 8px;border-radius:99px;white-space:nowrap;">${meta.label}</span>
                        </div>
                        <!-- Card body -->
                        <div style="padding:14px 16px;background:linear-gradient(135deg,#F7F2E4 0%,#EDE5CC 100%);flex:1;display:flex;flex-direction:column;">
                            ${priceHTML}
                            ${portraitsHTML}
                            ${inclusionsHTML}
                            ${freebiesHTML}
                            ${addonsHTML}
                            ${scoreHTML}
                        </div>
                        <div style="padding:12px 16px;border-top:1px solid #F0F4F5;background:#fff;">
                            <button type="button"
                                onclick="openAddToPackageModal(${cardIndex})"
                                class="w-full rounded-full bg-[#165166] text-white text-xs font-bold py-2.5 shadow hover:bg-[#134152]">
                                Add to Package
                            </button>
                        </div>
                    </div>`;
                }).join("");
            }

            // ── loadDashboardData: fetch popular recs, with fallback chain ──────────
            window.loadDashboardData = async function loadDashboardData() {
                // Show skeleton spinners while loading
                const grid = document.getElementById("popularRecsGrid");
                if (grid) {
                    grid.innerHTML = [1,2,3].map(() =>
                        `<div class="bg-white rounded-[20px] shadow-[0_3px_3px_1px_rgba(13,10,44,0.06)] overflow-hidden flex items-center justify-center" style="min-height:260px;">
                            <div style="width:32px;height:32px;border:4px solid #E0E8EB;border-top-color:#165166;border-radius:50%;animation:spin 0.7s linear infinite;"></div>
                        </div>`
                    ).join("");
                }

                try {
                    // Primary: structured popular endpoint
                    const data = await window.apiClient.recommendations.popular(3);
                    renderPopularRecs(data.recommendations || []);
                    return;
                } catch (e) {
                    console.warn("[dashboard] popular endpoint unavailable:", e.message);
                }

                // Fallback: pull packages list and build minimal cards
                try {
                    const pkgs = await window.apiClient.packages.list();
                    const pkgArr = Array.isArray(pkgs) ? pkgs : (pkgs.results || []);
                    renderPopularRecs(
                        pkgArr.slice(0, 3).map(p => ({
                            package:     p,
                            addons:      [],
                            base_price:  p.promo_price || p.price || 0,
                            total_price: p.promo_price || p.price || 0,
                            score:       0,
                            source:      "package_list_fallback",
                        }))
                    );
                } catch (e2) {
                    console.warn("[dashboard] packages fallback failed:", e2.message);
                    renderPopularRecs([]);
                }
            }

            // ── refreshDashboard: rebuild artifacts then reload data ─────────────────
            window.refreshDashboardRecs = async function refreshDashboardRecs() {
                const grid = document.getElementById("popularRecsGrid");
                if (grid) {
                    grid.innerHTML = `
                        <div class="col-span-full flex flex-col items-center justify-center" style="min-height:160px;gap:10px;">
                            <div style="width:36px;height:36px;border:4px solid #E0E8EB;border-top-color:#165166;border-radius:50%;animation:spin 0.7s linear infinite;"></div>
                            <p style="font-size:12px;color:#ABB7C2;font-weight:600;">Rebuilding recommender data…</p>
                        </div>`;
                }
                try {
                    await window.apiClient.recommendations.rebuild();
                    console.log("[dashboard] popularity rebuilt");
                } catch (e) {
                    console.warn("[dashboard] rebuild failed (non-fatal):", e.message);
                }
                await loadDashboardData();
                await initCharts();
            }

            function openLogoutModal(e) {
                e.preventDefault();
                document
                    .getElementById("logoutModal")
                    .classList.remove("hidden");
                document.getElementById("logoutModal").classList.add("flex");
            }

            function closeLogoutModal() {
                document.getElementById("logoutModal").classList.add("hidden");
                document.getElementById("logoutModal").classList.remove("flex");
            }

            function confirmLogout() {
                // 🔁 CHANGE THIS PATH IF NEEDED
                window.location.href = "../../index.html";
            }
        </script>
            <!-- ── NOTIFICATION PANEL (shared across all pages) ── -->
        <div class="booking-status-panel-overlay" id="bookingStatusOverlay" onclick="closeBookingStatusPanel()"></div>
        <div class="booking-status-panel" id="bookingStatusPanel" style="display:none;">
            <div class="booking-status-header">
                <h2>BOOKING STATUS</h2>
                <button class="close-panel-btn" onclick="closeBookingStatusPanel()">×</button>
            </div>
            <div class="booking-status-content" id="bookingStatusContent"></div>
        </div>
        <!-- ── FLOATING NOTIFICATION BUTTON ── -->
        <button class="floating-notification-btn" id="floatingNotificationBtn"
                aria-label="Notifications" onclick="toggleBookingStatusPanel()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M4.50763 17.625H19.4933C19.9097 17.625 20.1458 16.961 19.9006 16.5805C19.3329 15.6996 18.7814 14.401 18.7814 12.835L18.8058 10.6931C18.8058 6.44431 15.7588 3 12 3C8.29581 3 5.29296 6.39431 5.29296 10.5814L5.26855 12.835C5.26855 14.3903 4.69736 15.6818 4.10557 16.5624C3.85054 16.9419 4.08602 17.625 4.50763 17.625Z" fill="white"/>
                <path d="M9.33333 21C9.33333 22.1 10.1 23 12 23C13.9 23 14.6667 22.1 14.6667 21H9.33333Z" fill="white"/>
            </svg>
            <span class="notification-badge" id="notificationBadge" style="display:none;">0</span>
        </button>
        <!-- ── GLOBAL REFRESH BUTTON ── -->
        <button class="global-refresh-btn" id="globalRefreshBtn"
                aria-label="Refresh" onclick="refreshPage()" title="Refresh">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="23 4 23 10 17 10"/>
                <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
            </svg>
        </button>
        <!-- ── PAGE LOADING OVERLAY ── -->
        <div class="page-loading-overlay" id="pageLoadingOverlay" style="display:none;">
            <div class="spinner"></div>
            <div class="loading-label">Loading…</div>
        </div>
        <script src="../../scripts/api-client.js"></script>
        <script src="../../scripts/notif.js"></script>
        <script src="../../scripts/staff-embed.js"></script>

    </body>
</html>
