<!-- pages/staff_admin/packages.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heigen – Package Categories</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../styles/main.css">
    <link rel="stylesheet" href="../../styles/notif.css">
    <script src="../../scripts/alert-modal.js"></script>
</head>
<body class="staff-body">

    <!-- Mobile overlay -->
    

    <!-- ── Sidebar ── -->
    <!-- ── Main content ── -->
    <div class="main-content">
        <div class="header px-4 sm:px-6">
            <div class="flex items-center gap-3 min-w-0">
                <h2 class="staff-page-title truncate">Package Category</h2>
            </div>
            <div class="staff-header-user">
                <div class="staff-header-user-meta">
                    <div class="staff-header-user-name" data-user-name>—</div>
                    <div class="staff-header-user-role" data-user-role>—</div>
                </div>
                <img src=""
                     alt="User Avatar"
                     class="staff-header-avatar"
                     data-user-avatar>
            </div>
        </div>

        <main class="staff-main flex-1">
            <!-- Loading skeleton shown until JS fills the grid -->
            <div id="categoriesLoading" class="flex flex-col items-center justify-center py-24 gap-4">
                <div class="heigen-spinner" aria-hidden="true"></div>
                <p class="text-[#5F6E79] font-semibold text-sm">Loading categories…</p>
            </div>
            <div id="categoriesGrid"
                 class="hidden grid gap-5 max-w-[1029px] mx-auto
                        grid-cols-[repeat(auto-fill,minmax(280px,1fr))]">
                <!-- Populated by package-api.js -->
            </div>
            <section id="archivedCategoriesSection" class="hidden max-w-[1029px] mx-auto mt-8 space-y-3">
                <h3 class="text-[#4F6E79] font-bold text-lg">Archived Categories</h3>
                <div id="archivedCategoriesGrid"
                     class="grid gap-5 grid-cols-[repeat(auto-fill,minmax(280px,1fr))]">
                    <!-- Populated by package-api.js -->
                </div>
            </section>
        </main>
    </div>

    <!-- ── Create Category Modal ── -->
    <div id="createCategoryModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50">
        <div class="bg-white rounded-2xl p-6 w-[324px] space-y-4 shadow-xl">
            <div class="flex items-center justify-between">
                <h4 class="text-[#4F6E79] font-bold text-base">Create Category</h4>
                <button onclick="closeCreateModal()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <input id="createCategoryName" type="text" placeholder="Enter Category Name"
                   class="w-full border border-[#A3A2A2] rounded-md px-3 py-2 text-xs focus:outline-none focus:ring-2 focus:ring-[#165166]">
            <div class="flex items-center gap-1 flex-wrap">
                <label class="flex items-center justify-center h-[31px] px-4 rounded-md shadow cursor-pointer bg-[#FFE8AD] hover:bg-yellow-100 border border-gray-200">
                    <span class="text-[#5F6E79] text-xs font-semibold">Upload a Photo</span>
                    <input id="createCategoryPhoto" type="file" accept="image/*" class="hidden">
                </label>
                <span id="createPhotoName" class="text-[#A3A2A2] text-xs">No file chosen</span>
            </div>
            <div id="createCategoryPhotoPreviewBox" class="hidden overflow-hidden rounded-xl border border-[#E4ECEE] bg-[#F6FAFB]">
                <img id="createCategoryPhotoPreview" alt="" class="max-h-44 w-full object-contain">
            </div>
            <p class="text-[#A3A2A2] text-[11px]">Max photo size: 2MB</p>
            <div class="flex justify-end gap-1">
                <button onclick="closeCreateModal()" class="rounded-full border border-[#165167] text-[#165166] text-xs h-[30px] px-6 shadow hover:bg-gray-50">Discard</button>
                <button onclick="saveCreateCategory()" class="rounded-full bg-[#165167] text-white text-xs h-[30px] px-6 shadow hover:bg-[#134152]">Confirm</button>
            </div>
        </div>
    </div>

    <!-- ── Edit Category Modal ── -->
    <div id="editCategoryModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-[400px] space-y-4 shadow-xl border border-[#E3EAED] box-border">
            <div class="flex items-center justify-between">
                <h4 class="text-[#4F6E79] font-bold text-base">Edit Category</h4>
                <button onclick="closeEditModal()" class="text-gray-400 hover:text-gray-600">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <input id="editCategoryName" type="text" placeholder="Enter Category Name"
                   class="w-full border border-[#A3A2A2] rounded-md px-3 py-2 text-xs focus:outline-none focus:ring-2 focus:ring-[#165166]">
            <div class="flex items-center gap-1 flex-wrap">
                <label class="flex items-center justify-center h-[31px] px-4 rounded-md shadow cursor-pointer bg-[#FFE8AD] hover:bg-yellow-100 border border-gray-200">
                    <span class="text-[#5F6E79] text-xs font-semibold">Upload a Photo</span>
                    <input id="editCategoryPhoto" type="file" accept="image/*" class="hidden">
                </label>
                <span id="editPhotoName" class="text-[#A3A2A2] text-xs">No file chosen</span>
            </div>
            <div id="editCategoryPhotoPreviewBox" class="hidden overflow-hidden rounded-xl border border-[#E4ECEE] bg-[#F6FAFB]">
                <img id="editCategoryPhotoPreview" alt="" class="max-h-44 w-full object-contain">
            </div>
            <p class="text-[#A3A2A2] text-[11px]">Max photo size: 2MB</p>
            <!-- Grid layout: never use sm:flex-row here — viewport width breaks a narrow modal -->
            <div class="pt-1 space-y-2">
                <p class="text-[10px] font-semibold uppercase tracking-wide text-[#9AA8AF]">Save</p>
                <div class="grid grid-cols-2 gap-1.5 w-full">
                    <button type="button" onclick="closeEditModal()"
                            class="inline-flex items-center justify-center h-[30px] w-full rounded-full border border-[#165167] text-[#165166] text-[11px] font-medium shadow hover:bg-gray-50 transition-colors">Discard</button>
                    <button type="button" onclick="saveEditCategory()"
                            class="inline-flex items-center justify-center h-[30px] w-full rounded-full bg-[#165167] text-white text-[11px] font-medium shadow hover:bg-[#134152] transition-colors">Confirm</button>
                </div>
                <div class="border-t border-[#E8EEF0] pt-2 space-y-1.5">
                    <p class="text-[10px] font-semibold uppercase tracking-wide text-[#9AA8AF]">Archive or remove</p>
                    <div class="grid grid-cols-2 gap-1.5 w-full">
                        <button type="button" onclick="archiveCategory()"
                                class="inline-flex items-center justify-center h-[30px] w-full rounded-full bg-amber-500 text-white text-[11px] font-medium shadow hover:bg-amber-600 transition-colors">Archive</button>
                        <button type="button" onclick="deleteCategory()"
                                class="inline-flex items-center justify-center h-[30px] w-full rounded-full bg-red-500 text-white text-[11px] font-medium shadow hover:bg-red-600 transition-colors">Delete</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Logout Modal ── -->
    <div id="logoutModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50">
        <div class="bg-white rounded-2xl shadow-xl w-[90%] max-w-md p-6">
            <h3 class="text-xl font-bold text-[#165166] mb-4">Confirm Logout</h3>
            <p class="text-gray-500 mb-6">Are you sure you want to log out?</p>
            <div class="flex justify-end gap-2">
                <button onclick="closeLogoutModal()" class="px-3 py-2 rounded-lg bg-gray-200 text-gray-700 font-semibold hover:bg-gray-300">Cancel</button>
                <button onclick="confirmLogout()" class="px-3 py-2 rounded-lg bg-[#165166] text-white font-semibold hover:bg-[#0d3d4d]">Logout</button>
            </div>
        </div>
    </div>

    <script type="module" src="../../scripts/package-api.js"></script>

    <!-- ── Shared: notification panel + refresh + loading overlay ── -->
    <div class="booking-status-panel-overlay" id="bookingStatusOverlay" onclick="closeBookingStatusPanel()"></div>
    <div class="booking-status-panel" id="bookingStatusPanel" style="display:none;">
        <div class="booking-status-header">
            <h2>BOOKING STATUS</h2>
            <button class="close-panel-btn" onclick="closeBookingStatusPanel()">×</button>
        </div>
        <div class="booking-status-content" id="bookingStatusContent"></div>
    </div>
    <button class="floating-notification-btn" id="floatingNotificationBtn"
            aria-label="Notifications" onclick="toggleBookingStatusPanel()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M4.508 17.625H19.493c.416 0 .652-.664.407-1.044C19.333 15.7 18.781 14.4 18.781 12.835L18.806 10.693C18.806 6.444 15.759 3 12 3 8.296 3 5.293 6.394 5.293 10.581L5.269 12.835c0 1.556-.572 2.847-1.163 3.728C3.851 16.942 4.086 17.625 4.508 17.625Z" fill="white"/>
            <path d="M9.333 21C9.333 22.1 10.1 23 12 23c1.9 0 2.667-.9 2.667-2H9.333Z" fill="white"/>
        </svg>
        <span class="notification-badge" id="notificationBadge" style="display:none;">0</span>
    </button>
    <button class="global-refresh-btn" id="globalRefreshBtn"
            aria-label="Refresh" onclick="refreshPage()" title="Refresh">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"/>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
        </svg>
    </button>
    <div class="page-loading-overlay" id="pageLoadingOverlay" style="display:none;">
        <div class="spinner"></div>
        <div class="loading-label">Loading…</div>
    </div>
    <script src="../../scripts/api-client.js"></script>
    <script src="../../scripts/notif.js"></script>
    <script src="../../scripts/heigen-api.js"></script>
    <script src="../../scripts/staff-guard.js"></script>
    <script src="../../scripts/staff-profile.js"></script>
    <script src="../../scripts/staff-embed.js"></script>

</body>
</html>
