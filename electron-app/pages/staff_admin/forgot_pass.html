<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <!-- Tailwind -->
        <script src="https://cdn.tailwindcss.com"></script>

        <!-- Custom CSS (correct path for /pages) -->
        <link rel="stylesheet" href="../../styles/main.css" />
        <script src="../../scripts/alert-modal.js"></script>

        <!-- Fonts -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Segoe+UI:wght@400;600;700&display=swap"
            rel="stylesheet"
        />
    </head>

    <body class="bg-[#8FA9B3] min-h-screen">
        <!-- PAGE CONTENT -->
        <div
            id="forgot-password-screen"
            class="relative min-h-screen w-full flex items-center justify-center overflow-hidden"
        >
            <!-- Background image -->
            <img
                src="https://api.builder.io/api/v1/image/assets/TEMP/a1ef3d09429c4b2a9a729acef3e490d3cfd0c7d5?width=3072"
                alt="Background"
                class="absolute inset-0 w-full h-full object-cover"
            />

            <!-- Card -->
            <div class="relative z-10 w-full max-w-md mx-4">
                <div class="heigen-gradient rounded-2xl shadow-2xl p-8 sm:p-10">
                    <div class="flex justify-center mb-8">
                        <img
                            src="https://api.builder.io/api/v1/image/assets/TEMP/5d35d74fc3fd59993b265670560fef56cfd75771?width=444"
                            alt="Heigen Logo"
                            class="h-16 sm:h-20 w-auto"
                        />
                    </div>

                    <div class="text-center mb-8">
                        <h1 class="text-white text-2xl font-bold mb-2">
                            Reset Password
                        </h1>
                        <p class="text-white text-sm font-semibold">
                            Submit a request and wait for superuser approval.
                        </p>
                    </div>

                    <form id="reset-form" class="space-y-5">
                        <div>
                            <label
                                for="reset-email"
                                class="block text-white text-sm font-semibold mb-1"
                                >E-mail</label
                            >
                            <input
                                type="email"
                                id="reset-email"
                                required
                                class="w-full h-11 px-4 rounded-md text-gray-800 text-sm"
                                placeholder="Enter your email"
                            />
                        </div>

                        <button
                            type="submit"
                            id="reset-submit-btn"
                            class="btn-primary w-full h-10 rounded-md text-white text-base font-bold"
                        >
                            Request Temporary Password
                        </button>
                        <p
                            id="reset-feedback"
                            class="text-white/90 text-xs font-semibold text-center hidden"
                        ></p>

                        <div class="flex items-center justify-center pt-2">
                            <button
                                type="button"
                                onclick="navigateTo('../../index.html')"
                                class="link-button text-white text-sm font-bold"
                            >
                                Sign in
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <!-- Scripts -->
        <script src="../../scripts/heigen-api.js"></script>
        <script src="../../scripts/staff-guard.js"></script>
        <script src="../../scripts/heigen-app.js"></script>
        <script src="../../scripts/staff-profile.js"></script>
    </body>
</html>
