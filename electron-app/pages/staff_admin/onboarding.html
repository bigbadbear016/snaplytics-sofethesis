<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Account Setup</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Segoe+UI:wght@400;600;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="../../styles/main.css" />
        <script src="../../scripts/alert-modal.js"></script>
    </head>
    <body class="min-h-screen bg-[#9BB5BC]">
        <div class="min-h-screen flex items-center justify-center px-4 py-10">
            <div class="w-full max-w-3xl bg-white rounded-3xl shadow-2xl p-8 heigen-onboarding-card">
                <div class="flex items-center justify-between mb-8">
                    <div>
                        <h1 class="text-2xl font-extrabold text-[#165166]">
                            Account Setup
                        </h1>
                        <p class="text-sm text-gray-600">
                            Complete your profile to access the dashboard.
                        </p>
                    </div>
                    <div class="text-xs text-gray-500" id="setup-user-email">
                        —
                    </div>
                </div>

                <div class="flex items-center gap-4 mb-8">
                    <div class="flex items-center gap-2">
                        <div
                            class="step-dot w-3 h-3 rounded-full bg-[#165166]"
                            id="step-dot-1"
                        ></div>
                        <span class="text-xs font-semibold text-gray-700"
                            >Password</span
                        >
                    </div>
                    <div class="h-[1px] flex-1 bg-gray-200"></div>
                    <div class="flex items-center gap-2">
                        <div
                            class="step-dot w-3 h-3 rounded-full bg-gray-300"
                            id="step-dot-2"
                        ></div>
                        <span class="text-xs font-semibold text-gray-700"
                            >Photo</span
                        >
                    </div>
                    <div class="h-[1px] flex-1 bg-gray-200"></div>
                    <div class="flex items-center gap-2">
                        <div
                            class="step-dot w-3 h-3 rounded-full bg-gray-300"
                            id="step-dot-3"
                        ></div>
                        <span class="text-xs font-semibold text-gray-700"
                            >Profile</span
                        >
                    </div>
                </div>

                <div class="space-y-6">
                    <section data-step="1" class="step-panel">
                        <h2 class="text-lg font-bold text-[#165166] mb-2">
                            Change your password
                        </h2>
                        <p class="text-sm text-gray-600 mb-6">
                            You must set a new password before continuing.
                        </p>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label
                                    class="text-xs font-semibold text-gray-600"
                                    >New password</label
                                >
                                <input
                                    id="new-password"
                                    type="password"
                                    class="w-full mt-1 px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#165166]"
                                    placeholder="Enter new password"
                                />
                            </div>
                            <div>
                                <label
                                    class="text-xs font-semibold text-gray-600"
                                    >Confirm password</label
                                >
                                <input
                                    id="confirm-password"
                                    type="password"
                                    class="w-full mt-1 px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#165166]"
                                    placeholder="Confirm password"
                                />
                            </div>
                        </div>
                    </section>

                    <section data-step="2" class="step-panel hidden">
                        <h2 class="text-lg font-bold text-[#165166] mb-2">
                            Add your profile photo
                        </h2>
                        <p class="text-sm text-gray-600 mb-6">
                            Use a photo so your team can recognize you. Max 2MB.
                        </p>
                        <div class="flex flex-col md:flex-row gap-6 items-start">
                            <div
                                class="w-32 h-32 rounded-full bg-[#E8F0F2] flex items-center justify-center text-[#165166] font-bold text-3xl shadow-inner"
                                id="photo-preview"
                            >
                                NEW
                            </div>
                            <div class="flex-1 space-y-4">
                                <div>
                                    <label
                                        class="text-xs font-semibold text-gray-600"
                                        >Upload photo</label
                                    >
                                    <input
                                        id="photo-file"
                                        type="file"
                                        accept="image/*"
                                        class="w-full mt-1 px-4 py-3 rounded-xl border border-gray-200 bg-white"
                                    />
                                </div>
                                <div>
                                    <label
                                        class="text-xs font-semibold text-gray-600"
                                        >Or paste image URL</label
                                    >
                                    <input
                                        id="photo-url"
                                        type="url"
                                        class="w-full mt-1 px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#165166]"
                                        placeholder="https://..."
                                    />
                                </div>
                            </div>
                        </div>
                    </section>

                    <section data-step="3" class="step-panel hidden">
                        <h2 class="text-lg font-bold text-[#165166] mb-2">
                            Complete your profile
                        </h2>
                        <p class="text-sm text-gray-600 mb-6">
                            This is shown across the app.
                        </p>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label
                                    class="text-xs font-semibold text-gray-600"
                                    >First name</label
                                >
                                <input
                                    id="first-name"
                                    type="text"
                                    class="w-full mt-1 px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#165166]"
                                    placeholder="First name"
                                />
                            </div>
                            <div>
                                <label
                                    class="text-xs font-semibold text-gray-600"
                                    >Last name</label
                                >
                                <input
                                    id="last-name"
                                    type="text"
                                    class="w-full mt-1 px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#165166]"
                                    placeholder="Last name"
                                />
                            </div>
                            <div>
                                <label
                                    class="text-xs font-semibold text-gray-600"
                                    >Nickname</label
                                >
                                <input
                                    id="nickname"
                                    type="text"
                                    class="w-full mt-1 px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#165166]"
                                    placeholder="Nickname"
                                />
                            </div>
                            <div>
                                <label
                                    class="text-xs font-semibold text-gray-600"
                                    >Phone number</label
                                >
                                <input
                                    id="phone-number"
                                    type="tel"
                                    class="w-full mt-1 px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#165166]"
                                    placeholder="Phone number"
                                />
                            </div>
                            <div>
                                <label
                                    class="text-xs font-semibold text-gray-600"
                                    >Date of birth</label
                                >
                                <input
                                    id="date-of-birth"
                                    type="date"
                                    class="w-full mt-1 px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-[#165166]"
                                />
                            </div>
                        </div>
                    </section>
                </div>

                <div class="mt-8 flex items-center justify-between">
                    <button
                        id="prev-btn"
                        class="px-5 py-3 rounded-xl bg-gray-100 text-gray-700 font-semibold hover:bg-gray-200"
                        disabled
                    >
                        Back
                    </button>
                    <div class="flex items-center gap-3">
                        <span
                            id="step-error"
                            class="text-sm text-red-600 hidden"
                        ></span>
                        <button
                            id="next-btn"
                            class="px-6 py-3 rounded-xl bg-[#165166] text-white font-semibold hover:bg-[#0d3d4d]"
                        >
                            Next
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <script src="../../scripts/heigen-api.js"></script>
        <script src="../../scripts/staff-guard.js"></script>
        <script src="../../scripts/onboarding.js"></script>
        <script src="../../scripts/staff-profile.js"></script>
    </body>
</html>
