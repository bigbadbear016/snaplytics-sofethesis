<head>

    <link rel="stylesheet" href="../../styles/main.css">
    <link rel="stylesheet" href="../../styles/notif.css">
    <script src="../../scripts/alert-modal.js"></script>
    <style>
        /* ── Wizard layout ─────────────────────────────────────── */
        .wizard-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
            max-width: 560px;
            width: 100%;
            padding: 36px 40px 32px;
        }
        @media (max-width: 640px) {
            .wizard-card { padding: 24px 18px 24px; }
        }

        /* ── Step indicator ────────────────────────────────────── */
        .step-row {
            display: flex;
            align-items: center;
            gap: 0;
            margin-bottom: 28px;
        }
        .step-dot {
            width: 30px; height: 30px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700;
            border: 2px solid #165166; color: #165166;
            background: #fff; flex-shrink: 0;
            transition: background 0.2s, color 0.2s;
        }
        .step-dot.active   { background: #165166; color: #fff; }
        .step-dot.done     { background: #9BB5BC; border-color: #9BB5BC; color: #fff; }
        .step-line {
            flex: 1; height: 2px; background: #E0E0E0;
            transition: background 0.2s;
        }
        .step-line.done    { background: #9BB5BC; }
        .step-label-row {
            display: flex; justify-content: space-between;
            margin-top: 4px; margin-bottom: 20px;
        }
        .step-label {
            font-size: 11px; font-weight: 600; color: #ABB7C2;
            text-align: center; width: 30px; flex-shrink: 0;
        }
        .step-label.active { color: #165166; }

        /* ── Form fields ───────────────────────────────────────── */
        .form-label {
            display: block;
            font-size: 13px; font-weight: 600; color: #4F6E79;
            margin-bottom: 6px;
        }
        .form-input, .form-select {
            width: 100%; border: 1.5px solid #A3A2A2; border-radius: 8px;
            padding: 10px 14px; font-size: 13px; color: #424242;
            outline: none; transition: border 0.15s;
            background: #fff;
        }
        .form-input:focus, .form-select:focus { border-color: #165166; }
        .form-group { display: flex; flex-direction: column; gap: 4px; margin-bottom: 18px; }

        .checkbox-row {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 12px 14px; border: 1.5px solid #E0E0E0; border-radius: 8px;
            margin-bottom: 18px; cursor: pointer;
        }
        .checkbox-row input[type=checkbox] {
            width: 18px; height: 18px; margin-top: 2px; cursor: pointer;
            accent-color: #165166; flex-shrink: 0;
        }
        .checkbox-row label { font-size: 12px; color: #616161; cursor: pointer; line-height: 1.5; }

        /* ── Addon rows ────────────────────────────────────────── */
        .addon-row {
            display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
        }
        .addon-row select {
            flex: 1; border: 1.5px solid #A3A2A2; border-radius: 8px;
            padding: 8px 10px; font-size: 12px; color: #424242; outline: none;
        }
        .addon-row select:focus { border-color: #165166; }
        .qty-box {
            width: 36px; text-align: center; font-size: 13px; font-weight: 600; color: #424242;
        }
        .qty-btn {
            width: 28px; height: 28px; border-radius: 6px; border: 1.5px solid #A3A2A2;
            background: #fff; font-size: 16px; line-height: 1; cursor: pointer; color: #165166;
            display: flex; align-items: center; justify-content: center;
        }
        .qty-btn:hover { background: #F4F0E4; }
        .addon-remove { background: none; border: none; cursor: pointer; color: #c00; font-size: 18px; padding: 0 4px; }

        /* ── Summary ───────────────────────────────────────────── */
        .summary-row {
            display: flex; justify-content: space-between;
            font-size: 13px; color: #616161; padding: 3px 0;
        }
        .summary-row.total { font-weight: 700; font-size: 15px; color: #165166; padding-top: 8px; }
        .summary-divider { height: 1px; background: #E0E0E0; margin: 10px 0; }

        /* ── Action buttons ────────────────────────────────────── */
        .btn-back {
            border: 2px solid #165166; color: #165166; background: #fff;
            border-radius: 999px; padding: 8px 28px; font-size: 13px;
            font-weight: 700; cursor: pointer; transition: background 0.15s;
        }
        .btn-back:hover { background: #f0f8fa; }
        .btn-next {
            background: #165166; color: #fff;
            border: none; border-radius: 999px; padding: 8px 28px; font-size: 13px;
            font-weight: 700; cursor: pointer; transition: background 0.15s;
        }
        .btn-next:hover { background: #0d3d4d; }
        .btn-next:disabled { opacity: 0.5; cursor: not-allowed; }
        .action-row {
            display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px;
        }

        /* ── Success screen ─────────────────────────────────────── */
        .success-icon {
            width: 72px; height: 72px; border-radius: 50%;
            background: #165166; display: flex; align-items: center;
            justify-content: center; margin: 0 auto 20px;
        }

        /* ── Addon add button ───────────────────────────────────── */
        .addon-add-btn {
            width: 32px; height: 32px; border: 2px dashed #ABB7C2;
            border-radius: 8px; background: none; cursor: pointer;
            color: #ABB7C2; font-size: 20px; line-height: 1;
            display: flex; align-items: center; justify-content: center;
            transition: border-color 0.15s, color 0.15s;
        }
        .addon-add-btn:hover { border-color: #165166; color: #165166; }
    </style>
</head>

    <script>
    // ============================================================
    // SURVEY WIZARD STATE
    // ============================================================
    const survey = {
        step: 1,           // 1 = customer info, 2 = package/booking, 3 = summary, 4 = done
        customer: {
            name: "", email: "", contactNo: "", consent: false
        },
        booking: {
            type: "Walk-In",
            packageId: null, packageName: "", packagePrice: 0,
            addons: [], discount: 0, subtotal: 0, total: 0
        },
        packages: [],
        addons: [],
        savedCustomerId: null,
    };

    function normalizeToken(value) {
        return String(value ?? "").trim().toLowerCase();
    }

    function addonAppliesToPackage(addon, pkg) {
        if (!addon || !pkg) return false;
        const appliesTo = addon.applies_to;
        if (appliesTo == null || appliesTo === "") return true;

        const pkgCategory = normalizeToken(pkg.category);
        const pkgName = normalizeToken(pkg.name);
        const matches = (raw) => {
            const token = normalizeToken(raw);
            if (!token) return false;
            if (token === pkgCategory || token === pkgName) return true;
            return (
                (pkgCategory && token.includes(pkgCategory)) ||
                (pkgName && token.includes(pkgName))
            );
        };

        if (Array.isArray(appliesTo)) {
            return appliesTo.some(matches);
        }

        if (typeof appliesTo === "string") {
            const raw = appliesTo.trim();
            if (!raw) return true;
            return raw.split(/[|,/]/).some(matches) || matches(raw);
        }

        return false;
    }

    function getSelectedPackage() {
        const selectedId = survey.booking.packageId;
        if (!selectedId) return null;
        return survey.packages.find((p) => String(p.id) === String(selectedId)) || null;
    }

    function getAvailableAddonsForSelectedPackage() {
        const pkg = getSelectedPackage();
        if (!pkg) return [];
        return survey.addons.filter((addon) => addonAppliesToPackage(addon, pkg));
    }

    function pruneUnavailableSelectedAddons() {
        const availableIds = new Set(
            getAvailableAddonsForSelectedPackage().map((a) => String(a.id)),
        );
        survey.booking.addons = (survey.booking.addons || []).filter(
            (a) => a?.addonId && availableIds.has(String(a.addonId)),
        );
    }

    // ── Sidebar toggle ─────────────────────────────────────────
    function toggleMobileSidebar(show) {
        document.getElementById("sidebar").classList.toggle("mobile-open", show);
        document.getElementById("mobileOverlay").classList.toggle("show", show);
    }
    document.getElementById("mobileOverlay").addEventListener("click", () => toggleMobileSidebar(false));

    function openLogoutModal(e) {
        e.preventDefault();
        document.getElementById("logoutModal").classList.remove("hidden");
        document.getElementById("logoutModal").classList.add("flex");
    }
    function closeLogoutModal() {
        document.getElementById("logoutModal").classList.add("hidden");
        document.getElementById("logoutModal").classList.remove("flex");
    }
    function confirmLogout() { window.location.href = "../../index.html"; }

    // ── Step indicator HTML ────────────────────────────────────
    function stepIndicatorHTML(current) {
        const steps = ["Customer Info", "Booking", "Summary"];
        const dots = steps.map((_, i) => {
            const n = i + 1;
            const cls = n < current ? "done" : n === current ? "active" : "";
            const icon = n < current
                ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`
                : n;
            return { cls, icon };
        });
        let html = `<div class="step-row">`;
        dots.forEach((d, i) => {
            html += `<div class="step-dot ${d.cls}">${d.icon}</div>`;
            if (i < dots.length - 1) html += `<div class="step-line ${i + 1 < current ? "done" : ""}"></div>`;
        });
        html += `</div>`;
        // labels
        html += `<div class="step-label-row">`;
        steps.forEach((label, i) => {
            html += `<span class="step-label ${i + 1 === current ? "active" : ""}" style="width:auto;font-size:10px;">${label}</span>`;
        });
        html += `</div>`;
        return html;
    }

    // ============================================================
    // STEP 1 – Customer Info
    // ============================================================
    function renderStep1() {
        const c = survey.customer;
        document.getElementById("wizardCard").innerHTML = `
            ${stepIndicatorHTML(1)}
            <h2 style="font-size:18px;font-weight:800;color:#165166;margin-bottom:20px;">Customer Info</h2>
            <form id="step1Form" onsubmit="handleStep1(event)">
                <div class="form-group">
                    <label class="form-label">Full Name <span style="color:#c00;">*</span></label>
                    <input class="form-input" id="s1name" type="text" placeholder="Enter full name"
                           value="${escHtml(c.name)}" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label">Email <span style="color:#c00;">*</span></label>
                    <input class="form-input" id="s1email" type="email" placeholder="Enter email"
                           value="${escHtml(c.email)}" required autocomplete="off">
                </div>
                <div class="form-group">
                    <label class="form-label">Contact No.</label>
                    <input class="form-input" id="s1contact" type="tel" placeholder="e.g. 0917-123-4567"
                           value="${escHtml(c.contactNo)}" autocomplete="off">
                </div>
                <div class="checkbox-row" onclick="document.getElementById('s1consent').click()">
                    <input type="checkbox" id="s1consent" onclick="event.stopPropagation()"
                           ${c.consent ? "checked" : ""}>
                    <label onclick="event.preventDefault()">
                        I hereby consent to Heigen Studio releasing my photos on public and social media platforms.
                    </label>
                </div>
                <div class="action-row">
                    <button type="submit" class="btn-next">Next →</button>
                </div>
            </form>`;
    }

    function handleStep1(e) {
        e.preventDefault();
        survey.customer.name      = document.getElementById("s1name").value.trim();
        survey.customer.email     = document.getElementById("s1email").value.trim();
        survey.customer.contactNo = document.getElementById("s1contact").value.trim();
        survey.customer.consent   = document.getElementById("s1consent").checked;
        survey.step = 2;
        renderStep2();
    }

    // ============================================================
    // STEP 2 – Package / Booking Info
    // ============================================================
    async function renderStep2() {
        document.getElementById("wizardCard").innerHTML = `
            ${stepIndicatorHTML(2)}
            <h2 style="font-size:18px;font-weight:800;color:#165166;margin-bottom:20px;">Package Info</h2>
            <div style="display:flex;align-items:center;justify-content:center;padding:40px 0;">
                <div style="width:36px;height:36px;border:4px solid #ddd;border-top-color:#165166;
                            border-radius:50%;animation:spin 0.7s linear infinite;"></div>
            </div>
            <style>@keyframes spin{to{transform:rotate(360deg);}}</style>`;

        // Load packages & addons if not yet loaded
        if (!survey.packages.length) {
            try {
                const [pkgs, adds] = await Promise.all([
                    window.apiClient.packages.list(),
                    window.apiClient.addons.list(),
                ]);
                survey.packages = Array.isArray(pkgs) ? pkgs : (pkgs.results ?? []);
                survey.addons   = Array.isArray(adds) ? adds : (adds.results ?? []);
            } catch (err) {
                console.error("Failed to load packages/addons:", err);
                survey.packages = [];
                survey.addons   = [];
            }
        }
        renderStep2Form();
    }

    function renderStep2Form() {
        const b = survey.booking;
        const availableAddons = getAvailableAddonsForSelectedPackage();
        const pkgOptions = survey.packages.map(p =>
            `<option value="${p.id}" ${b.packageId === p.id ? "selected" : ""}>
                ${escHtml(p.name)} – ₱${Number(p.promo_price || p.price || 0).toFixed(2)}
             </option>`
        ).join("");

        const addonRows = (b.addons || []).map((addon, idx) => {
            const addonOpts = availableAddons.map(a =>
                `<option value="${a.id}" ${(String(addon.addonId) === String(a.id)) ? "selected" : ""}>
                    ${escHtml(a.name)} – ₱${Number(a.price || 0).toFixed(2)}
                 </option>`
            ).join("");
            return `
            <div class="addon-row" id="addonRow_${idx}">
                <select onchange="handleS2AddonChange(${idx}, this.value)">
                    <option value="">Select addon</option>
                    ${addonOpts}
                </select>
                <button type="button" class="qty-btn" onclick="handleS2Qty(${idx}, -1)">−</button>
                <div class="qty-box" id="qty_${idx}">${addon.quantity ?? 1}</div>
                <button type="button" class="qty-btn" onclick="handleS2Qty(${idx}, 1)">+</button>
                <button type="button" class="addon-remove" onclick="handleS2RemoveAddon(${idx})">🗑</button>
            </div>`;
        }).join("");

        document.getElementById("wizardCard").innerHTML = `
            ${stepIndicatorHTML(2)}
            <h2 style="font-size:18px;font-weight:800;color:#165166;margin-bottom:20px;">Package Info</h2>
            <form id="step2Form" onsubmit="handleStep2(event)">
                <div class="form-group">
                    <label class="form-label">Booking Type</label>
                    <select class="form-select" id="s2type">
                        <option value="Walk-In" ${b.type === "Walk-In" ? "selected" : ""}>Walk-In</option>
                        <option value="Reserved" ${b.type === "Reserved" ? "selected" : ""}>Reserved</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Package <span style="color:#c00;">*</span></label>
                    <select class="form-select" id="s2package" onchange="handleS2PackageChange(this.value)" required>
                        <option value="">Select a package</option>
                        ${pkgOptions}
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Add-ons</label>
                    <div id="s2addonsList">${addonRows}</div>
                    <button type="button" class="addon-add-btn" onclick="handleS2AddAddon()" title="Add addon">+</button>
                    ${b.packageId && availableAddons.length === 0
                        ? `<p style="margin-top:8px;font-size:12px;color:#9AA8AF;">No add-ons available for the selected package.</p>`
                        : ""}
                </div>
                <div class="form-group">
                    <label class="form-label">Discount (₱)</label>
                    <input class="form-input" id="s2discount" type="number" min="0" step="1"
                           value="${b.discount ?? 0}">
                </div>
                <div class="action-row">
                    <button type="button" class="btn-back" onclick="goBackStep1()">← Back</button>
                    <button type="submit" class="btn-next">Next →</button>
                </div>
            </form>`;
    }

    function handleS2PackageChange(val) {
        const pkg = survey.packages.find(p => String(p.id) === String(val));
        if (!pkg) {
            survey.booking.packageId = null;
            survey.booking.packageName = "";
            survey.booking.packagePrice = 0;
            survey.booking.addons = [];
            renderStep2Form();
            return;
        }
        survey.booking.packageId    = pkg.id;
        survey.booking.packageName  = pkg.name;
        survey.booking.packagePrice = Number(pkg.promo_price || pkg.price || 0);
        pruneUnavailableSelectedAddons();
        renderStep2Form();
    }

    function handleS2AddonChange(idx, val) {
        const availableAddons = getAvailableAddonsForSelectedPackage();
        const a = availableAddons.find(a => String(a.id) === String(val));
        if (!a) return;
        const qty = survey.booking.addons[idx]?.quantity ?? 1;
        survey.booking.addons[idx] = { addonId: a.id, name: a.name, price: Number(a.price ?? 0), quantity: qty };
    }

    function handleS2Qty(idx, delta) {
        const addon = survey.booking.addons[idx];
        if (!addon) return;
        addon.quantity = Math.max(1, (addon.quantity ?? 1) + delta);
        const el = document.getElementById(`qty_${idx}`);
        if (el) el.textContent = addon.quantity;
    }

    function handleS2RemoveAddon(idx) {
        survey.booking.addons.splice(idx, 1);
        renderStep2Form();
    }

    function handleS2AddAddon() {
        if (!survey.booking.packageId) {
            alert("Please select a package first.");
            return;
        }
        if (!getAvailableAddonsForSelectedPackage().length) {
            alert("No add-ons available for the selected package.");
            return;
        }
        survey.booking.addons.push({ addonId: null, name: "", price: 0, quantity: 1 });
        renderStep2Form();
    }

    function handleStep2(e) {
        e.preventDefault();
        const pkgVal = document.getElementById("s2package").value;
        if (!pkgVal) { alert("Please select a package."); return; }

        const pkg = survey.packages.find(p => String(p.id) === String(pkgVal));
        const packagePrice = pkg ? Number(pkg.promo_price || pkg.price || 0) : 0;
        const discount     = parseFloat(document.getElementById("s2discount").value) || 0;
        const addonsTotal  = (survey.booking.addons || []).reduce(
            (s, a) => s + (a.price ?? 0) * (a.quantity ?? 1), 0
        );

        survey.booking.type         = document.getElementById("s2type").value;
        survey.booking.packageId    = pkg ? pkg.id : null;
        survey.booking.packageName  = pkg ? pkg.name : "";
        survey.booking.packagePrice = packagePrice;
        survey.booking.discount     = discount;
        survey.booking.subtotal     = packagePrice + addonsTotal;
        survey.booking.total        = packagePrice + addonsTotal - discount;

        survey.step = 3;
        renderStep3();
    }

    function goBackStep1() { survey.step = 1; renderStep1(); }
    function goBackStep2() { survey.step = 2; renderStep2Form(); }

    // ============================================================
    // STEP 3 – Summary
    // ============================================================
    function renderStep3() {
        const c = survey.customer;
        const b = survey.booking;
        const addonsHTML = (b.addons || []).filter(a => a.name).map(a =>
            `<div class="summary-row">
                <span>${escHtml(a.name)} × ${a.quantity}</span>
                <span>₱${((a.price ?? 0) * (a.quantity ?? 1)).toFixed(2)}</span>
             </div>`
        ).join("") || `<div class="summary-row"><span style="color:#ABB7C2;">No add-ons</span><span></span></div>`;

        document.getElementById("wizardCard").innerHTML = `
            ${stepIndicatorHTML(3)}
            <h2 style="font-size:18px;font-weight:800;color:#165166;margin-bottom:20px;">Summary</h2>

            <div style="background:#F9F9F9;border-radius:12px;padding:16px 18px;margin-bottom:20px;">
                <div style="font-size:11px;font-weight:700;color:#ABB7C2;text-transform:uppercase;margin-bottom:10px;">Customer</div>
                <div class="summary-row"><span style="color:#5F6E79;font-weight:600;">Name</span><span>${escHtml(c.name)}</span></div>
                <div class="summary-row"><span style="color:#5F6E79;font-weight:600;">Email</span><span>${escHtml(c.email)}</span></div>
                <div class="summary-row"><span style="color:#5F6E79;font-weight:600;">Contact</span><span>${escHtml(c.contactNo || "—")}</span></div>
                <div class="summary-row"><span style="color:#5F6E79;font-weight:600;">Consent</span>
                    <span style="color:${c.consent ? "#165166" : "#c00"};">${c.consent ? "Agreed ✓" : "Not agreed"}</span>
                </div>
            </div>

            <div style="background:#F9F9F9;border-radius:12px;padding:16px 18px;margin-bottom:20px;">
                <div style="font-size:11px;font-weight:700;color:#ABB7C2;text-transform:uppercase;margin-bottom:10px;">Booking</div>
                <div class="summary-row"><span style="color:#5F6E79;font-weight:600;">Type</span><span>${escHtml(b.type)}</span></div>
                <div class="summary-row"><span style="color:#5F6E79;font-weight:600;">Package</span><span>${escHtml(b.packageName)}</span></div>
                <div class="summary-row"><span style="color:#5F6E79;">Base Price</span><span>₱${b.packagePrice.toFixed(2)}</span></div>
                <div class="summary-divider"></div>
                <div style="font-size:11px;font-weight:700;color:#ABB7C2;text-transform:uppercase;margin-bottom:8px;">Add-ons</div>
                ${addonsHTML}
                <div class="summary-divider"></div>
                <div class="summary-row"><span>Subtotal</span><span>₱${b.subtotal.toFixed(2)}</span></div>
                <div class="summary-row"><span>Discount</span><span>−₱${b.discount.toFixed(2)}</span></div>
                <div class="summary-row total"><span>TOTAL</span><span>₱${b.total.toFixed(2)}</span></div>
            </div>

            <div class="action-row">
                <button type="button" class="btn-back" onclick="goBackStep2()">← Back</button>
                <button type="button" class="btn-next" id="confirmBtn" onclick="handleConfirm()">Confirm &amp; Save</button>
            </div>`;
    }

    // ============================================================
    // STEP 4 – Save to API
    // ============================================================
    async function handleConfirm() {
        const btn = document.getElementById("confirmBtn");
        if (btn) btn.disabled = true;
        const overlay = document.getElementById("pageLoadingOverlay");
        if (overlay) { overlay.style.display = "flex"; overlay.querySelector(".loading-label").textContent = "Saving…"; }

        try {
            // 1. Create customer
            const custPayload = {
                name:      survey.customer.name,
                email:     survey.customer.email,
                contactNo: survey.customer.contactNo,
                consent:   survey.customer.consent ? "I Agree" : "I Disagree",
            };
            let createdCustomer = null;
            try {
                createdCustomer = await window.apiClient.customers.create(custPayload);
            } catch (createErr) {
                const allCustomers = await window.apiClient.customers.listAll();
                const email = (survey.customer.email || "").toLowerCase();
                const contact = (survey.customer.contactNo || "").toLowerCase();
                const name = (survey.customer.name || "").toLowerCase();
                createdCustomer = (allCustomers || []).find((c) => {
                    const cEmail = (c.email || "").toLowerCase();
                    const cContact = (c.contactNo || "").toLowerCase();
                    const cName = (c.name || "").toLowerCase();
                    return (
                        (email && cEmail === email) ||
                        (contact && cContact === contact) ||
                        (name && cName === name)
                    );
                });
                if (!createdCustomer) {
                    throw createErr;
                }
                // Optionally sync consent if needed
                if (custPayload.consent && createdCustomer.consent !== custPayload.consent) {
                    try {
                        await window.apiClient.customers.update(createdCustomer.id, {
                            consent: custPayload.consent,
                        });
                    } catch (_) {}
                }
            }
            survey.savedCustomerId = createdCustomer.id;

            // 2. Create booking under new customer
            const b = survey.booking;
            const bookingPayload = {
                package_id:     b.packageId,
                customer_id:    survey.savedCustomerId,
                session_status: "BOOKED",
                total_price:    b.total,
                discounts:      b.discount ? String(b.discount) : "",
                addons_input:   (b.addons || [])
                    .filter(a => a.addonId)
                    .map(a => ({ addonId: a.addonId, quantity: a.quantity ?? 1 })),
            };
            await window.apiClient.bookings.create(survey.savedCustomerId, bookingPayload);

            // Done
            if (overlay) overlay.style.display = "none";
            survey.step = 4;
            renderStep4();
        } catch (err) {
            if (overlay) overlay.style.display = "none";
            if (btn) btn.disabled = false;
            console.error("Survey save error:", err);
            alert("Failed to save: " + err.message);
        }
    }

    // ============================================================
    // STEP 4 – Success
    // ============================================================
    function renderStep4() {
        document.getElementById("wizardCard").innerHTML = `
            <div style="text-align:center;padding:20px 0 8px;">
                <div class="success-icon">
                    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3">
                        <polyline points="20 6 9 17 4 12"/>
                    </svg>
                </div>
                <h2 style="font-size:22px;font-weight:800;color:#165166;margin-bottom:8px;">Booking Confirmed!</h2>
                <p style="font-size:14px;color:#616161;margin-bottom:6px;">
                    <strong>${escHtml(survey.customer.name)}</strong> has been registered and their booking saved.
                </p>
                <p style="font-size:12px;color:#ABB7C2;margin-bottom:32px;">Customer ID: ${survey.savedCustomerId ?? "—"}</p>
                <div style="display:flex;justify-content:center;gap:12px;flex-wrap:wrap;">
                    <button class="btn-back" onclick="startOver()">+ New Entry</button>
                    <button class="btn-next" onclick="window.location.href='customers.html'">View Customers</button>
                </div>
            </div>`;
    }

    function startOver() {
        survey.step = 1;
        survey.customer = { name: "", email: "", contactNo: "", consent: false };
        survey.booking  = { type: "Walk-In", packageId: null, packageName: "", packagePrice: 0,
                             addons: [], discount: 0, subtotal: 0, total: 0 };
        survey.savedCustomerId = null;
        renderStep1();
    }

    // ── Utility ────────────────────────────────────────────────
    function escHtml(str) {
        return String(str ?? "")
            .replace(/&/g, "&amp;").replace(/</g, "&lt;")
            .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    // ── Boot ───────────────────────────────────────────────────
    document.addEventListener("DOMContentLoaded", () => {
        renderStep1();
        // Preload packages in background
        if (window.apiClient) {
            Promise.all([
                window.apiClient.packages.list(),
                window.apiClient.addons.list()
            ]).then(([pkgs, adds]) => {
                survey.packages = Array.isArray(pkgs) ? pkgs : (pkgs.results ?? []);
                survey.addons   = Array.isArray(adds) ? adds : (adds.results ?? []);
            }).catch(() => {});
        }
    });
    </script>
    <script src="../../scripts/heigen-api.js"></script>
    <script src="../../scripts/staff-guard.js"></script>
    <script src="../../scripts/staff-profile.js"></script>
    <script src="../../scripts/staff-embed.js"></script>
</body>
</html>
